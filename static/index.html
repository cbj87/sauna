                                className="flex-1 bg-gray-600 text-gray-300 rounded-lg py-1.5 font-semibold">Cancel</button>
                            </div>
                          </>
                        ) : (
                          <>
                            <div className="space-y-0.5 mb-2">
                              {Object.entries(row).map(([k, v]) => (
                                <div key={k} className="flex gap-2">
                                  <span className="text-gray-500 w-28 flex-shrink-0">{k}</span>
                                  <span className="text-gray-200 break-all">{v === null ? <span className="text-gray-600">null</span> : String(v)}</span>
                                </div>
                              ))}
                            </div>
                            {!isReadOnly && (
                              <div className="flex gap-2">
                                <button onClick={() => { setDbEditId(row.id); setDbEditDraft(Object.fromEntries(Object.entries(row).filter(([k]) => !['id','created_at','member_name','member_color','target_temp_f'].includes(k)))); }}
                                  className="flex-1 bg-gray-600 text-gray-200 rounded-lg py-1.5 font-semibold">Edit</button>
                                <button onClick={() => deleteDbRow(row.id)}
                                  className="px-4 bg-red-900/60 text-red-400 rounded-lg py-1.5 font-semibold">Delete</button>
                              </div>
                            )}
                          </>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── admin panel ──────────────────────────────────────────────────────────────
function AdminPanel({ currentMember, presets = [], onReloadPresets }) {
  const [data, setData] = useState(null);
  const [busy, setBusy] = useState(false);
  // preset editing
  const [editPresetName, setEditPresetName] = useState(null);
  const [editPresetLabel, setEditPresetLabel] = useState('');
  const [editPresetTempF, setEditPresetTempF] = useState(194);
  const [editPresetOnTime, setEditPresetOnTime] = useState(60);
  // approve flow
  const [approvingId, setApprovingId] = useState(null);
  const [approveHasLimit, setApproveHasLimit] = useState(false);
  const [approveMaxTempF, setApproveMaxTempF] = useState(212);
  // max temp inline edit for approved members
  const [editMaxTempId, setEditMaxTempId] = useState(null);
  const [editMaxTempHasLimit, setEditMaxTempHasLimit] = useState(false);
  const [editMaxTempF, setEditMaxTempF] = useState(212);
  // admin set-credentials (escape hatch for members who forgot their PIN)
  const [setCredsId, setSetCredsId]           = useState(null);
  const [setCredsEmail, setSetCredsEmail]     = useState('');
  const [setCredsPass, setSetCredsPass]       = useState('');
  const [setCredsConfirm, setSetCredsConfirm] = useState('');
  const [setCredsError, setSetCredsError]     = useState('');

  async function load() {
    try { setData(await api('/api/admin/members')); } catch {}
  }
  function startEditPreset(p) {
    setEditPresetName(p.name);
    setEditPresetLabel(p.label);
    setEditPresetTempF(p.target_temp_f);
    setEditPresetOnTime(p.on_time);
  }
  async function savePreset() {
    setBusy(true);
    try {
      await api(`/api/admin/presets/${editPresetName}`, {method:'PUT', body:{
        label: editPresetLabel,
        target_temp: fToC(editPresetTempF),
        on_time: editPresetOnTime,
      }});
      setEditPresetName(null);
      onReloadPresets();
    } catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }
  async function deletePreset(name) {
    if (!confirm('Delete this preset?')) return;
    setBusy(true);
    try {
      await api(`/api/admin/presets/${name}`, {method:'DELETE'});
      onReloadPresets();
    } catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  async function handleSetCredentials(e) {
    e.preventDefault();
    if (setCredsPass !== setCredsConfirm) { setSetCredsError('Passwords don\'t match'); return; }
    if (setCredsPass.length < 8) { setSetCredsError('Password must be at least 8 characters'); return; }
    setBusy(true);
    setSetCredsError('');
    try {
      await api(`/api/admin/members/${setCredsId}/set-credentials`, {method:'PUT', body:{email: setCredsEmail, password: setCredsPass}});
      setSetCredsId(null); setSetCredsEmail(''); setSetCredsPass(''); setSetCredsConfirm('');
      await load();
    } catch(e) { setSetCredsError(e.message); }
    finally { setBusy(false); }
  }

  useEffect(() => { load(); }, []);

  async function approve(id) {
    setBusy(true);
    try {
      const body = approveHasLimit ? { max_temp: fToC(approveMaxTempF) } : {};
      await api(`/api/admin/members/${id}/approve`, {method:'POST', body});
      setApprovingId(null); setApproveHasLimit(false);
      await load();
    }
    catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  async function reject(id) {
    if (!confirm('Reject this member?')) return;
    setBusy(true);
    try { await api(`/api/admin/members/${id}/reject`, {method:'POST'}); await load(); }
    catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  async function toggleAdmin(id, makeAdmin) {
    if (!confirm(makeAdmin ? 'Make this member an admin?' : 'Remove admin privileges?')) return;
    setBusy(true);
    try { await api(`/api/admin/members/${id}`, {method:'PUT', body:{is_admin: makeAdmin}}); await load(); }
    catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  function startEditMaxTemp(m) {
    setEditMaxTempId(m.id);
    setEditMaxTempHasLimit(m.max_temp != null);
    setEditMaxTempF(m.max_temp ? cToF(m.max_temp) : 212);
  }

  async function saveMaxTemp(id) {
    setBusy(true);
    try {
      const body = { max_temp: editMaxTempHasLimit ? fToC(editMaxTempF) : null };
      await api(`/api/admin/members/${id}`, {method:'PUT', body});
      setEditMaxTempId(null);
      await load();
    }
    catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  if (!data) return <div className="text-center text-gray-500 py-8 pulse">Loading…</div>;

  const pending = data.members.filter(m => m.status === 'pending');
  const approved = data.members.filter(m => m.status === 'approved');

  return (
    <div className="space-y-5">
      {pending.length > 0 && (
        <div className="bg-gray-800 rounded-2xl p-5">
          <h2 className="font-bold text-base mb-4 text-orange-400">Pending Approval ({pending.length})</h2>
          <div className="space-y-3">
            {pending.map(m => (
              <div key={m.id} className="bg-gray-700/50 rounded-xl overflow-hidden">
                <div className="flex items-center justify-between px-4 py-3">
                  <div>
                    <div className="font-semibold">{m.name}</div>
                    <div className="text-xs text-gray-400">Awaiting approval</div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => { setApprovingId(approvingId === m.id ? null : m.id); setApproveHasLimit(false); }} disabled={busy}
                      className="bg-green-700 hover:bg-green-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg disabled:opacity-50">
                      Approve…
                    </button>
                    <button onClick={() => reject(m.id)} disabled={busy}
                      className="bg-red-900 hover:bg-red-800 text-red-300 text-xs font-bold px-3 py-1.5 rounded-lg disabled:opacity-50">
                      Reject
                    </button>
                  </div>
                </div>
                {approvingId === m.id && (
                  <div className="px-4 pb-4 pt-2 border-t border-gray-600/50 fade-in">
                    <div className="flex items-center justify-between mb-3">
                      <span className="text-sm text-gray-300 font-semibold">Max temperature limit</span>
                      <button onClick={() => setApproveHasLimit(!approveHasLimit)}
                        className={`relative w-10 h-5 rounded-full transition-colors ${approveHasLimit ? 'bg-orange-500' : 'bg-gray-600'}`}>
                        <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform ${approveHasLimit ? 'translate-x-5' : 'translate-x-0.5'}`} />
                      </button>
                    </div>
                    {approveHasLimit && (
                      <div className="mb-3">
                        <div className="text-xs text-gray-400 mb-1">{approveMaxTempF}°F ({fToC(approveMaxTempF)}°C)</div>
                        <input type="range" min={104} max={230} step={2} value={approveMaxTempF}
                          onChange={e => setApproveMaxTempF(Number(e.target.value))} className="w-full" />
                        <div className="flex justify-between text-xs text-gray-600 mt-0.5"><span>104°F</span><span>230°F</span></div>
                      </div>
                    )}
                    <button onClick={() => approve(m.id)} disabled={busy}
                      className="w-full py-2 rounded-xl font-bold text-white bg-green-700 hover:bg-green-600 disabled:opacity-50">
                      {approveHasLimit ? `Approve with ${approveMaxTempF}°F limit` : 'Approve (no limit)'}
                    </button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="bg-gray-800 rounded-2xl p-5">
        <h2 className="font-bold text-base mb-4">Members ({approved.length})</h2>
        <div className="space-y-2">
          {approved.map(m => (
            <div key={m.id} className="bg-gray-700/50 rounded-xl overflow-hidden">
              <div className="flex items-center justify-between px-4 py-3">
                <div className="flex items-center gap-3">
                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background: m.color || '#6B7280'}} />
                  <div>
                    <div className="font-semibold">
                      {m.name}
                      {m.is_admin ? <span className="text-xs text-orange-400 ml-1.5">admin</span> : null}
                      {!m.email ? <span className="text-xs text-amber-600 ml-1.5">PIN only</span> : null}
                    </div>
                    <div className="text-xs text-gray-400">
                      {m.email ? <span className="text-gray-500 mr-1.5">{m.email} ·</span> : null}
                      {cToF(m.default_temp)}°F · {m.default_time} min
                      {m.max_temp != null
                        ? <span className="text-orange-400 ml-1.5">· max {cToF(m.max_temp)}°F</span>
                        : <span className="text-gray-600 ml-1.5">· no temp limit</span>}
                    </div>
                  </div>
                </div>
                {m.id !== currentMember.id && (
                  <div className="flex items-center gap-2">
                    {!m.email && (
                      <button onClick={() => { setSetCredsId(setCredsId === m.id ? null : m.id); setSetCredsEmail(''); setSetCredsPass(''); setSetCredsConfirm(''); setSetCredsError(''); }} disabled={busy}
                        className="text-xs text-amber-500 hover:text-amber-400 font-semibold px-2 py-1 rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-50">
                        {setCredsId === m.id ? 'cancel' : 'set creds'}
                      </button>
                    )}
                    <button onClick={() => editMaxTempId === m.id ? setEditMaxTempId(null) : startEditMaxTemp(m)} disabled={busy}
                      className="text-xs text-gray-500 hover:text-orange-400 font-semibold px-2 py-1 rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-50">
                      {editMaxTempId === m.id ? 'cancel' : 'limit'}
                    </button>
                    <button onClick={() => toggleAdmin(m.id, !m.is_admin)} disabled={busy}

                      {m.is_admin ? 'admin ✓' : 'admin'}
                    </button>
                    <button onClick={() => reject(m.id)} disabled={busy}
                      className="text-gray-600 hover:text-red-400 text-lg leading-none disabled:opacity-50">×</button>
                  </div>
                )}
              </div>
              {editMaxTempId === m.id && (
                <div className="px-4 pb-4 pt-2 border-t border-gray-600/50 fade-in">
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-sm text-gray-300 font-semibold">Max temperature limit</span>
                    <button onClick={() => setEditMaxTempHasLimit(!editMaxTempHasLimit)}
                      className={`relative w-10 h-5 rounded-full transition-colors ${editMaxTempHasLimit ? 'bg-orange-500' : 'bg-gray-600'}`}>
                      <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform ${editMaxTempHasLimit ? 'translate-x-5' : 'translate-x-0.5'}`} />
                    </button>
                  </div>
                  {editMaxTempHasLimit && (
                    <div className="mb-3">
                      <div className="text-xs text-gray-400 mb-1">{editMaxTempF}°F ({fToC(editMaxTempF)}°C)</div>
                      <input type="range" min={104} max={230} step={2} value={editMaxTempF}
                        onChange={e => setEditMaxTempF(Number(e.target.value))} className="w-full" />
                      <div className="flex justify-between text-xs text-gray-600 mt-0.5"><span>104°F</span><span>230°F</span></div>

                    {setCredsError && <p className="text-red-400 text-xs text-center">{setCredsError}</p>}
                    <button type="submit" disabled={busy}
                      className="w-full py-2 rounded-xl font-bold text-white bg-amber-600 hover:bg-amber-500 disabled:opacity-50">
                      Set credentials
                    </button>
                  </form>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      <div className="bg-gray-800 rounded-2xl p-5">
        <h2 className="font-bold text-base mb-4">Presets</h2>
        <div className="space-y-2">
          {presets.map(p => (
            <div key={p.name} className="bg-gray-700/50 rounded-xl overflow-hidden">

                  <div>
                    <div className="text-xs text-gray-400 mb-1">Name</div>
                    <input value={editPresetLabel} onChange={e => setEditPresetLabel(e.target.value)}
                      className="w-full bg-gray-700 rounded-lg px-3 py-2 text-white text-sm" />
                  </div>
                  <div>
                    <div className="text-xs text-gray-400 mb-1">Temperature — {editPresetTempF}°F ({fToC(editPresetTempF)}°C)</div>
                    <input type="range" min={104} max={230} step={2} value={editPresetTempF}
                      onChange={e => setEditPresetTempF(Number(e.target.value))} className="w-full" />
                    <div className="flex justify-between text-xs text-gray-600 mt-0.5"><span>104°F</span><span>230°F</span></div>
                  </div>
                  <div>
                    <div className="text-xs text-gray-400 mb-1">Duration</div>
                    <div className="flex gap-2">
                      {[30,60,90,120].map(d => (
                        <button key={d} onClick={() => setEditPresetOnTime(d)}
                          className={`flex-1 py-1.5 rounded-lg text-xs font-semibold ${editPresetOnTime===d?'bg-orange-500 text-white':'bg-gray-700 text-gray-300'}`}>{d}m</button>
                      ))}
                    </div>
                  </div>
                  <button onClick={savePreset} disabled={busy}
                    className="w-full py-2 rounded-xl font-bold text-white bg-orange-500 hover:bg-orange-400 disabled:opacity-50">
                    Save preset
                  </button>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── notifications panel ──────────────────────────────────────────────────────
function NotificationsPanel({ onClose, notifState, notifLoading, vapidKey, onSubscribeToggle, notifPrefs, onPrefChange, currentMember }) {
  const isSubscribed = notifState === 'subscribed';
  const isDenied = notifState === 'denied';

  function Toggle({ checked, onChange, disabled, loading }) {
    return (
      <button
        onClick={() => !disabled && !loading && onChange(!checked)}
        disabled={disabled || loading}
        className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors flex-shrink-0 ${
          disabled ? 'opacity-40 cursor-not-allowed' : loading ? 'cursor-wait' : 'cursor-pointer'
        } ${checked ? 'bg-orange-500' : 'bg-gray-600'}`}>
        {loading
          ? <span className="absolute inset-0 flex items-center justify-center">
              <span className="w-3 h-3 border-2 border-white/40 border-t-white rounded-full animate-spin" />
            </span>
          : <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${checked ? 'translate-x-6' : 'translate-x-1'}`} />
        }
      </button>
    );
  }

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center p-4" onClick={onClose}>
      <div className="bg-gray-800 rounded-2xl w-full max-w-sm fade-in" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-700">
          <h2 className="text-lg font-bold">Notifications</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-white text-xl leading-none p-1">✕</button>
        </div>

        <div className="px-6 py-5 space-y-5">
          {/* Master push toggle */}
          <div className="flex items-center justify-between gap-4">
            <div>
              <p className="font-semibold text-sm">Push notifications</p>
              <p className="text-xs text-gray-400 mt-0.5">
                {isDenied ? 'Blocked in browser settings — enable in Settings > Safari/Chrome'
                  : isSubscribed ? 'Notifications are enabled on this device'
                  : 'Enable to receive alerts on this device'}
              </p>
            </div>
            <Toggle checked={isSubscribed} onChange={onSubscribeToggle} disabled={isDenied} loading={notifLoading} />
          </div>

          {/* Per-notification toggles — only shown when subscribed */}
          {isSubscribed && (
            <>
              <div className="border-t border-gray-700 pt-4 space-y-4">
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Alert types</p>

                <div className="flex items-center justify-between gap-4">
                  <div>
                    <p className="text-sm font-medium">Preheat reminders</p>
                    <p className="text-xs text-gray-400 mt-0.5">35 min before your session starts</p>
                  </div>
                  <Toggle checked={notifPrefs.preheat !== false} onChange={v => onPrefChange('preheat', v)} />
                </div>

                <div className="flex items-center justify-between gap-4">
                  <div>
                    <p className="text-sm font-medium">Session ending soon</p>
                    <p className="text-xs text-gray-400 mt-0.5">15 min before your session ends</p>
                  </div>
                  <Toggle checked={notifPrefs.session_ending !== false} onChange={v => onPrefChange('session_ending', v)} />
                </div>

                {currentMember?.is_admin && (
                  <>
                    <div className="flex items-center justify-between gap-4">
                      <div>
                        <p className="text-sm font-medium">Sauna on / off</p>
                        <p className="text-xs text-gray-400 mt-0.5">When the sauna is turned on or off</p>
                      </div>
                      <Toggle checked={notifPrefs.sauna_control !== false} onChange={v => onPrefChange('sauna_control', v)} />
                    </div>

                    <div className="flex items-center justify-between gap-4">
                      <div>
                        <p className="text-sm font-medium">New sign-ups</p>
                        <p className="text-xs text-gray-400 mt-0.5">When someone requests to join</p>
                      </div>
                      <Toggle checked={notifPrefs.signup !== false} onChange={v => onPrefChange('signup', v)} />
                    </div>

                    <div className="flex items-center justify-between gap-4">
                      <div>
                        <p className="text-sm font-medium">Bookings</p>
                        <p className="text-xs text-gray-400 mt-0.5">When a member creates or edits a booking</p>
                      </div>
                      <Toggle checked={notifPrefs.booking !== false} onChange={v => onPrefChange('booking', v)} />
                    </div>
                  </>
                )}
              </div>
            </>
          )}
        </div>
      </div>

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

  const [notifLoading, setNotifLoading] = useState(false);
  const [showNotifPanel, setShowNotifPanel] = useState(false);
  const [notifPrefs, setNotifPrefs] = useState(currentMember?.notification_prefs || {});

  const today = localDate(new Date());
  const [bookingsLoading, setBookingsLoading] = useState(true);
  const [expandedDays, setExpandedDays] = useState(() => new Set([today]));

  const [statusUpdatedAt, setStatusUpdatedAt] = useState(null);

  async function loadStatus() {
    try {
      const s = await api('/api/sauna/status');
      setStatus(s);
      setStatusUpdatedAt(new Date());
    } catch(e) {
      setStatus(prev => prev); // keep stale
    }
  }

  async function loadBookings(windowDays) {
    setBookingsLoading(true);
    try {
      const days = (windowDays || bookingWindowDays) - 1;
      const dEnd = new Date(); dEnd.setDate(dEnd.getDate() + days);
      const b = await api(`/api/bookings?date_from=${today}&date_to=${localDate(dEnd)}`);
      setBookings(b);
    } catch {} finally {
      setBookingsLoading(false);
    }
  }

  useEffect(() => {
    api('/api/config').then(cfg => {
      const w = cfg.booking_window_days || 30;
      setBookingWindowDays(w);
      loadBookings(w);
    }).catch(() => loadBookings());
  }, []);

  async function loadMembers() {
    try {
      const m = await api('/api/members');
      setMembers(m);
    } catch {}
  }

  async function loadPresets() {
    try {
      const p = await api('/api/presets');
      setPresets(p);
    } catch {}
  }

  async function loadPendingCount() {
    if (!currentMember?.is_admin) return;
    try {
      const d = await api('/api/admin/members');
      setPendingCount(d.pending_count || 0);
    } catch {}
  }

  useEffect(() => {
    loadStatus();
    loadBookings();
    loadMembers();
    loadPresets();
    loadPendingCount();
    // Only poll pending count (DB-only, no Harvia API hit).
    // Status is fetched on load, after button presses, and on manual refresh only.
    const interval = setInterval(loadPendingCount, 300000); // 5 min
    return () => clearInterval(interval);
  }, []);

  // Push notification setup
  useEffect(() => {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      setNotifState('unsupported');
      return;
    }
    api('/api/push/vapid-key').then(d => {
      if (d.publicKey) setVapidKey(d.publicKey);
    }).catch(() => {});
    navigator.serviceWorker.ready.then(async reg => {
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        setNotifState('subscribed');
      } else {
        setNotifState(Notification.permission === 'denied' ? 'denied' : 'default');
      }
    });
    // Listen for messages from SW (e.g. notification tap → open booking or tab)
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'OPEN_BOOKING') {
        setTab('today');
        loadBookings();
        loadStatus();
      } else if (e.data?.type === 'OPEN_TAB') {
        setTab(e.data.tab);
        if (e.data.tab === 'controls') loadStatus();
      }
    });
  }, []);

  // Refresh bookings (DB only) when app is foregrounded — no Harvia API call.
  useEffect(() => {
    function onVisible() {
      if (!document.hidden) loadBookings();
    }
    document.addEventListener('visibilitychange', onVisible);
    return () => document.removeEventListener('visibilitychange', onVisible);
  }, []);

  async function handlePrefChange(key, value) {
    const updated = { ...notifPrefs, [key]: value };
    setNotifPrefs(updated);
    try {
      await api(`/api/members/${currentMember.id}/notification-prefs`, { method: 'PUT', body: { [key]: value } });
    } catch(e) { toast(e.message, 'error'); }
  }

  async function sendTestNotification() {
    try {
      await api('/api/push/test', { method: 'POST' });
      toast('Test notification sent — check your phone!', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }

  async function subscribePush() {
    if (notifLoading) return;
    if (!vapidKey) { toast('Push notifications are not configured on the server', 'error'); return; }
    setNotifLoading(true);
    try {
      if (notifState === 'subscribed') {
        // Toggle off
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          await api('/api/push/unsubscribe', { method: 'POST', body: { endpoint: sub.endpoint } });
          await sub.unsubscribe();
        }
        setNotifState('default');
        toast('Notifications disabled', 'info');
        return;
      }
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') { setNotifState('denied'); return; }
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(vapidKey),
      });
      const subJson = sub.toJSON();
      await api('/api/push/subscribe', {
        method: 'POST',
        body: { endpoint: subJson.endpoint, p256dh: subJson.keys.p256dh, auth: subJson.keys.auth },
      });
      setNotifState('subscribed');
      toast('Preheat reminders on!', 'success');
    } catch(e) {
      toast('Could not update notification settings', 'error');
    } finally {
      setNotifLoading(false);
    }
  }

  // Offline state + booking queue
  const [isOnline, setIsOnline] = useState(navigator.onLine);

  useEffect(() => {
    const goOnline  = () => setIsOnline(true);
    const goOffline = () => setIsOnline(false);
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, []);

  // PWA install prompt
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) && !window.navigator.standalone;
  const [installPromptEvent, setInstallPromptEvent] = useState(null);
  const [showInstallBanner, setShowInstallBanner] = useState(false);

  useEffect(() => {
    if (isStandalone || localStorage.getItem('installBannerDismissed')) return;
    const handler = e => { e.preventDefault(); setInstallPromptEvent(e); setShowInstallBanner(true); };
    window.addEventListener('beforeinstallprompt', handler);
    if (isIOS) setTimeout(() => setShowInstallBanner(true), 1500);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  async function handleInstall() {
    if (!installPromptEvent) return;
    installPromptEvent.prompt();
    const { outcome } = await installPromptEvent.userChoice;
    if (outcome === 'accepted') { setShowInstallBanner(false); setInstallPromptEvent(null); }
  }

  function dismissInstallBanner() {
    setShowInstallBanner(false);
    localStorage.setItem('installBannerDismissed', '1');
  }

  // Flush queued bookings whenever we come back online
  useEffect(() => {
    if (isOnline) flushBookingQueue();
  }, [isOnline]);

  async function flushBookingQueue() {
    const queue = JSON.parse(localStorage.getItem('pendingBookings') || '[]');
    if (queue.length === 0) return;
    const failed = [];
    let saved = 0;
    for (const item of queue) {
      try {
        await api('/api/bookings', { method: 'POST', body: item });
        saved++;
      } catch { failed.push(item); }
    }
    if (saved > 0) { toast(`${saved} queued booking${saved > 1 ? 's' : ''} saved!`, 'success'); loadBookings(); }
    if (failed.length > 0) localStorage.setItem('pendingBookings', JSON.stringify(failed));
    else localStorage.removeItem('pendingBookings');
  }

  // SW message: background sync triggered flush
  useEffect(() => {
    if (!('serviceWorker' in navigator)) return;
    const handler = e => {
      if (e.data?.type === 'FLUSH_BOOKING_QUEUE') flushBookingQueue();
    };
    navigator.serviceWorker.addEventListener('message', handler);
    return () => navigator.serviceWorker.removeEventListener('message', handler);
  }, []);

  async function handleCreateBooking(data) {
    try {
      await api('/api/bookings', {method:'POST', body:data});
      toast('Booking saved!', 'success');
      setShowBookModal(false);
      loadBookings();
    } catch(e) {
      if (!navigator.onLine) {
        const queue = JSON.parse(localStorage.getItem('pendingBookings') || '[]');
        queue.push(data);
        localStorage.setItem('pendingBookings', JSON.stringify(queue));
        if ('serviceWorker' in navigator && 'sync' in ServiceWorkerRegistration.prototype) {
          navigator.serviceWorker.ready.then(reg => reg.sync.register('sync-bookings')).catch(() => {});
        }
        toast("You're offline — booking queued and will save when back online", 'info');
        setShowBookModal(false);
      } else {
        toast(e.message, 'error');
      }
    }
  }

  async function handleCancelBooking(id) {
    try {
      await api(`/api/bookings/${id}`, {method:'DELETE'});
      toast('Booking cancelled', 'info');
      setSelectedSlot(null);
      loadBookings();
    } catch(e) { toast(e.message, 'error'); }
  }

  const [editingBooking, setEditingBooking] = useState(null);

  async function handleEditBooking(id, data) {
    try {
      await api(`/api/bookings/${id}`, {method:'PUT', body:data});
      toast('Booking updated!', 'success');
      setEditingBooking(null);
      loadBookings();
    } catch(e) { toast(e.message, 'error'); }
  }

  async function handlePreheat(id) {
    try {
      await api(`/api/bookings/${id}/preheat`, {method:'POST'});
      toast('Preheating started!', 'success');
      setSelectedSlot(null);
      loadBookings();
      loadStatus();
    } catch(e) { toast(e.message, 'error'); }
  }

  const { pullY, refreshing: pullRefreshing, atThreshold } = usePullToRefresh(
    () => Promise.all([loadBookings(), loadStatus()]),
    true   // enabled on all tabs
  );

  function handleEmptyTimelineClick(t, date) {
    if (members.length === 0) {
      toast('Add a family member first', 'info');
      setTab('members');
      return;
    }
    setBookDefaultDate(date || today);
    setBookDefaultTime(t);
    setShowBookModal(true);
  }

  const nowStr = timeStr(new Date());

  return (
    <div className="min-h-screen bg-gray-900 text-white max-w-lg mx-auto">
      {/* header */}
      <header className="pwa-header sticky top-0 z-30 bg-gray-900/95 backdrop-blur border-b border-gray-800 px-5 py-4">
        <div className="flex items-center justify-between">
          <h1 className="text-xl font-black tracking-tight">🛖 Sweat Box</h1>
          <div className="flex items-center gap-2">
            <button onClick={() => setShowHelp(true)}
              className="text-xs text-gray-500 hover:text-gray-300 font-semibold px-2 py-1 rounded-lg hover:bg-gray-800 transition-colors">
              FAQ
            </button>
            {vapidKey && notifState !== 'unsupported' && notifState !== 'loading' && (
              <button
                onClick={() => setShowNotifPanel(true)}
                title="Notification settings"
                className={`flex items-center gap-1.5 px-2 py-1.5 rounded-xl transition-all ${notifState === 'subscribed' ? 'text-orange-400 bg-orange-400/10 hover:bg-orange-400/20' : notifState === 'denied' ? 'text-gray-600 opacity-40' : 'text-gray-500 hover:text-gray-300 hover:bg-gray-800'}`}>
                {notifState === 'denied' ? (
                  <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    <path d="M18.63 13A17.89 17.89 0 0 1 18 8"/>
                    <path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/>
                    <path d="M18 8a6 6 0 0 0-9.33-5"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  </svg>
                ) : (
                  <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                  </svg>
                )}
                <span className="text-xs font-bold">{notifState === 'subscribed' ? 'ON' : 'OFF'}</span>
              </button>
            )}
            <button onClick={onLogout} title={`Logout ${currentMember?.name}`}
              className="text-xs text-gray-500 hover:text-gray-300 font-semibold px-2 py-1 rounded-lg hover:bg-gray-800 transition-colors">
              {currentMember?.name} ↩
            </button>
          </div>
        </div>
      </header>

      {/* offline banner */}
      {!isOnline && (
        <div className="flex items-center justify-center gap-2 bg-amber-500/10 border-b border-amber-500/20 px-4 py-2 text-amber-400 text-xs font-medium">
          <svg className="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 6s4-4 11-4 11 4 11 4"/><path d="M5 10s2.5-2.5 7-2.5S19 10 19 10"/><path d="M8.5 14s1.5-1.5 3.5-1.5 3.5 1.5 3.5 1.5"/><line x1="12" y1="19" x2="12.01" y2="19"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          You're offline — showing cached data
        </div>
      )}

      {/* install banner */}
      {showInstallBanner && (
        <div className="bg-gray-800 border-b border-gray-700 px-4 py-3">
          {isIOS ? (
            <div className="flex items-start gap-3">
              <span className="text-2xl mt-0.5">🛖</span>
              <div className="flex-1">
                <p className="text-sm font-semibold text-white">Add Sweat Box to your Home Screen</p>
                <p className="text-xs text-gray-400 mt-1">
                  Tap <span className="text-blue-400 font-semibold">Share</span> <span className="text-blue-400">⬆</span> at the bottom of Safari, then tap <span className="text-blue-400 font-semibold">"Add to Home Screen"</span>
                </p>
              </div>
              <button onClick={dismissInstallBanner} className="text-gray-500 hover:text-gray-300 text-lg leading-none p-1">✕</button>
            </div>
          ) : (
            <div className="flex items-center gap-3">
              <span className="text-2xl">🛖</span>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-semibold text-white">Add Sweat Box to your Home Screen</p>
                <p className="text-xs text-gray-400">Opens instantly, works offline</p>
              </div>
              <button onClick={handleInstall} className="bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white text-xs font-bold px-3 py-2 rounded-lg shrink-0">Add App</button>
              <button onClick={dismissInstallBanner} className="text-gray-500 hover:text-gray-300 text-lg leading-none p-1">✕</button>
            </div>
          )}
        </div>
      )}

      {/* tab nav */}
      {(() => {
        const tabs = [
          {id:'today',    label:'Today'},
          {id:'controls', label:'Controls'},
          {id:'members',  label:'Members'},
          ...(currentMember?.is_admin ? [
            {id:'admin', label:'Admin', badge: pendingCount},
            {id:'logs',  label:'Logs'},
          ] : []),
        ];
        const tabIcon = {
          today:    <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
          controls: <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>,
          members:  <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
          admin:    <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
          logs:     <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
        };
        const TopBtn = t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex-1 py-3 text-sm font-semibold transition-colors relative ${tab===t.id?'text-orange-400 border-b-2 border-orange-400':'text-gray-500 hover:text-gray-300'}`}>
            {t.label}
            {t.badge > 0 && (
              <span className="absolute top-1.5 right-1/4 w-4 h-4 bg-orange-500 text-white text-xs font-black rounded-full flex items-center justify-center leading-none">{t.badge}</span>
            )}
          </button>
        );
        const BotBtn = t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex-1 flex flex-col items-center py-2.5 gap-1 transition-all relative ${tab===t.id?'text-orange-400':'text-gray-500 hover:text-gray-400'}`}>
            <span className={`p-1.5 rounded-xl transition-all ${tab===t.id ? 'bg-orange-400/15' : ''}`}>
              {tabIcon[t.id]}
            </span>
            <span className="text-[10px] font-semibold tracking-wide">{t.label}</span>
            {t.badge > 0 && (
              <span className="absolute top-1.5 right-[calc(50%-20px)] w-4 h-4 bg-orange-500 text-white text-[10px] font-black rounded-full flex items-center justify-center leading-none">{t.badge}</span>
            )}
          </button>
        );
        return (
          <>
            <nav className="pwa-top-nav flex border-b border-gray-800 bg-gray-900 sticky top-[65px] z-20">
              {tabs.map(TopBtn)}
            </nav>
            <nav className="pwa-bottom-nav fixed bottom-0 left-0 right-0 z-30 bg-gray-900/95 backdrop-blur border-t border-gray-800">
              <div className="max-w-lg mx-auto flex" style={{paddingBottom:'env(safe-area-inset-bottom)'}}>
                {tabs.map(BotBtn)}
              </div>
            </nav>
          </>
        );
      })()}

      {/* content */}
      <main className="pwa-main px-4 py-5 pb-28 space-y-5">

        {/* pull-to-refresh indicator — shown on all tabs */}
        {(pullY > 0 || pullRefreshing) && (
          <div className="flex justify-center items-center overflow-hidden transition-all duration-150"
            style={{height: pullRefreshing ? 36 : Math.min(pullY, 84)}}>
            <span className={`text-sm font-semibold transition-colors ${atThreshold || pullRefreshing ? 'text-orange-400' : 'text-gray-500'}`}>
              {pullRefreshing ? '↻ Refreshing…' : atThreshold ? '↑ Release to refresh' : '↓ Pull to refresh'}
            </span>
          </div>
        )}

        {tab === 'today' && (
          <>
            {/* section header */}
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-lg font-black tracking-tight">Schedule</h2>
              <button onClick={loadBookings} className="text-xs text-gray-500 hover:text-gray-300">↻ refresh</button>
            </div>

            {/* stacked 7-day week view */}
            {Array.from({length: 7}, (_, i) => {
              const d = new Date(); d.setDate(d.getDate() + i);
              const iso = localDate(d);
              const dayBookings = bookings.filter(b => b.date === iso);
              const isExpanded  = expandedDays.has(iso);
              function toggleDay() {
                setExpandedDays(prev => {
                  const next = new Set(prev);
                  next.has(iso) ? next.delete(iso) : next.add(iso);
                  return next;
                });
              }
              return (
                <DayRow
                  key={iso}
                  date={iso}
                  bookings={dayBookings}
                  members={members}
                  expanded={isExpanded}
                  onToggle={toggleDay}
                  onSlotClick={setSelectedSlot}
                  onEmptyClick={t => handleEmptyTimelineClick(t, iso)}
                  onCardPress={setSelectedSlot}
                  onPreheat={handlePreheat}
                  loading={bookingsLoading}
                />
              );
            })}
          </>
        )}

        {tab === 'controls' && (
          <Controls status={status} statusUpdatedAt={statusUpdatedAt} bookings={bookings} members={members} presets={presets} currentMember={currentMember} onRefresh={loadStatus} onBook={loadBookings} toast={toast} />
        )}

        {tab === 'members' && (
          <MembersPanel members={members} currentMember={currentMember} onReload={() => { loadMembers(); loadBookings(); }} />
        )}

        {tab === 'admin' && currentMember?.is_admin && (
          <AdminPanel currentMember={currentMember} presets={presets} onReloadPresets={loadPresets} />
        )}

        {tab === 'logs' && currentMember?.is_admin && (
          <LogsPanel currentMember={currentMember} />
        )}
      </main>

      {/* FAB */}
      {tab === 'today' && (
        <button
          onClick={() => {
            if (members.length === 0) { toast('Add a family member first','info'); setTab('members'); return; }
            setBookDefaultDate(today);
            setBookDefaultTime(nowStr);
            setShowBookModal(true);
          }}
          className="pwa-fab fixed bottom-6 right-6 bg-orange-500 hover:bg-orange-400 text-white rounded-full w-14 h-14 text-2xl shadow-xl flex items-center justify-center z-40 transition-all active:scale-95">
          +
        </button>
      )}

      {/* modals */}
      {showBookModal && (
        <BookingModal
          defaultTime={bookDefaultTime}
          defaultDate={bookDefaultDate || today}
          members={members}
          bookings={bookings}
          onClose={()=>setShowBookModal(false)}
          onSave={handleCreateBooking}
          bookingWindowDays={bookingWindowDays}
        />
      )}
      {selectedSlot && (
        <SlotModal
          booking={selectedSlot}
          onClose={()=>setSelectedSlot(null)}
          onCancel={handleCancelBooking}
          onPreheat={handlePreheat}
          onEdit={b => { setSelectedSlot(null); setEditingBooking(b); }}
          currentMember={currentMember}
        />
      )}
      {editingBooking && (
        <BookingModal
          editingBooking={editingBooking}
          members={members}
          bookings={bookings}
          onClose={() => setEditingBooking(null)}
          onSave={data => handleEditBooking(editingBooking.id, data)}
          bookingWindowDays={bookingWindowDays}
        />
      )}

      {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
      {showNotifPanel && (
        <NotificationsPanel
          onClose={() => setShowNotifPanel(false)}
          notifState={notifState}
          notifLoading={notifLoading}
          vapidKey={vapidKey}
          onSubscribeToggle={subscribePush}
          notifPrefs={notifPrefs}
          onPrefChange={handlePrefChange}
          currentMember={currentMember}
        />
      )}
      <ToastStack toasts={toasts} />
    </div>
  );
}

// ─── app root (auth state machine) ───────────────────────────────────────────
function App() {
  const [authState, setAuthState] = useState('loading'); // loading|login|signup|pending|main|migrate|forgot|reset
  const [currentMember, setCurrentMember] = useState(null);
  const [sessionExpired, setSessionExpired] = useState(false);
  const [resetToken, setResetToken] = useState(null);

  useEffect(() => {
    // Check for password reset token in URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('reset_token');
    if (token) {
      setResetToken(token);
      setAuthState('reset');
      return;
    }

    _onSessionExpired = () => {
      setCurrentMember(null);
      setSessionExpired(true);
      setAuthState('login');
    };
    api('/api/auth/me').then(({ member, csrf_token }) => {
      if (csrf_token) _csrfToken = csrf_token;
      if (!member) { setAuthState('login'); return; }
      if (member.status === 'pending') { setAuthState('pending'); return; }
      setCurrentMember(member);
      setAuthState('main');
    }).catch(() => setAuthState('login'));
    return () => { _onSessionExpired = null; };
  }, []);

  function handleLogin(member) {
    setSessionExpired(false);
    setCurrentMember(member);
    setAuthState('main');
  }

  function handleSignup(result) {
    setSessionExpired(false);
    if (result.status === 'approved') {
      setCurrentMember(result.member);
      setAuthState('main');
    } else {
      setAuthState('pending');
    }
  }

  async function handleLogout() {
    try { await api('/api/auth/logout', {method:'POST'}); } catch {}
    _csrfToken = null;
    setCurrentMember(null);
    setAuthState('login');
  }

  if (authState === 'loading') return (
    <div className="min-h-screen bg-gray-900 flex items-center justify-center">
      <div className="text-gray-500 pulse text-lg">Loading…</div>
    </div>
  );
  if (authState === 'login')    return <LoginScreen onLogin={handleLogin} onShowSignup={() => setAuthState('signup')} onShowMigrate={() => setAuthState('migrate')} onShowForgot={() => setAuthState('forgot')} sessionExpired={sessionExpired} />;
  if (authState === 'signup')   return <SignupScreen onSignup={handleSignup} onBack={() => setAuthState('login')} />;
  if (authState === 'migrate')  return <MigrateScreen onLogin={handleLogin} onBack={() => setAuthState('login')} />;
  if (authState === 'forgot')   return <ForgotPasswordScreen onBack={() => setAuthState('login')} />;
  if (authState === 'reset')    return <ResetPasswordScreen token={resetToken} onLogin={member => { history.replaceState({}, '', '/'); handleLogin(member); }} onForgot={() => { history.replaceState({}, '', '/'); setAuthState('forgot'); }} />;
  if (authState === 'pending')  return <PendingScreen onLogout={handleLogout} />;
  return <MainApp currentMember={currentMember} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
