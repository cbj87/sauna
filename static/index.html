<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── helpers ────────────────────────────────────────────────────────────────
const cToF = c => c != null ? Math.round(c * 9/5 + 32) : null;
const fToC = f => Math.round((f - 32) * 5/9);
const fmt = v => v != null ? v : '—';
const pad = n => String(n).padStart(2,'0');
const timeStr = d => `${pad(d.getHours())}:${pad(d.getMinutes())}`;
// Convert internal HH:MM → "h:MM AM/PM" for display
const fmtTime = hhmm => {
  if (!hhmm) return '';
  const [h, m] = hhmm.split(':').map(Number);
  return `${h % 12 || 12}:${pad(m)} ${h >= 12 ? 'PM' : 'AM'}`;
};


// Local YYYY-MM-DD — unlike toISOString() this respects the device timezone
const localDate = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

let _onSessionExpired = null;
let _csrfToken = null;

async function api(path, opts = {}) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 10000); // 10 s timeout
  try {
    const res = await fetch(path, {
      headers: {
        'Content-Type': 'application/json',
        ...(_csrfToken ? {'X-CSRF-Token': _csrfToken} : {}),
      },
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
      signal: controller.signal,
    });
    if (res.status === 401 && _onSessionExpired && _csrfToken) { _onSessionExpired(); throw new Error('Session expired'); }
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  } catch(e) {
    if (e.name === 'AbortError') throw new Error('Request timed out — check your connection');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

// ─── toast ──────────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type='info') => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return { toasts, push };
}

function ToastStack({ toasts }) {
  const variants = {
    info:    { bar: 'bg-blue-500',  icon: <svg className="w-4 h-4 shrink-0 text-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> },
    success: { bar: 'bg-green-500', icon: <svg className="w-4 h-4 shrink-0 text-green-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg> },
    error:   { bar: 'bg-red-500',   icon: <svg className="w-4 h-4 shrink-0 text-red-400"  viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> },
  };
  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 flex flex-col gap-2 z-50 pointer-events-none">
      {toasts.map(t => {
        const v = variants[t.type] || variants.info;
        return (
          <div key={t.id} className="fade-in flex items-center gap-3 bg-gray-900/95 backdrop-blur-sm border border-white/10 text-white text-sm font-medium pl-0 pr-5 py-3 rounded-2xl shadow-2xl overflow-hidden whitespace-nowrap">
            <span className={`self-stretch w-1 shrink-0 ${v.bar} rounded-l-2xl`}/>
            <span className="pl-3">{v.icon}</span>
            {t.msg}
          </div>
        );
      })}
    </div>
  );
}

// ─── skeleton ────────────────────────────────────────────────────────────────
function Skeleton({ className = '' }) {
  return <div className={`bg-gray-700/60 rounded-xl animate-pulse ${className}`} />;
}

// ─── pull-to-refresh ─────────────────────────────────────────────────────────
function usePullToRefresh(onRefresh, enabled) {
  const [pullY, setPullY]       = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const startY      = useRef(0);
  const active      = useRef(false);
  const pullYRef    = useRef(0);   // avoids stale state in async onTouchEnd
  const onRefreshRef  = useRef(onRefresh);
  const enabledRef    = useRef(enabled);
  useEffect(() => { onRefreshRef.current = onRefresh; });
  useEffect(() => { enabledRef.current  = enabled;   });
  const THRESHOLD = 64;

  useEffect(() => {
    function onTouchStart(e) {
      if (!enabledRef.current || window.scrollY > 0) return;
      startY.current    = e.touches[0].clientY;
      active.current    = true;
      pullYRef.current  = 0;
    }
    function onTouchMove(e) {
      if (!active.current) return;
      const dy = e.touches[0].clientY - startY.current;
      if (dy > 0 && window.scrollY === 0) {
        e.preventDefault();   // must be non-passive to work in iOS PWA
        const next = Math.min(dy * 0.45, THRESHOLD + 20);
        pullYRef.current = next;
        setPullY(next);
      } else {
        active.current   = false;
        pullYRef.current = 0;
        setPullY(0);
      }
    }
    async function onTouchEnd() {
      if (!active.current) return;
      active.current = false;
      const captured = pullYRef.current;
      pullYRef.current = 0;
      setPullY(0);
      if (captured >= THRESHOLD) {
        setRefreshing(true);
        try { await onRefreshRef.current(); } finally { setRefreshing(false); }
      }
    }
    // touchmove MUST be non-passive so e.preventDefault() suppresses
    // the browser's native overscroll — the old React synthetic handlers
    // are passive-only and can't do this.
    document.addEventListener('touchstart', onTouchStart, { passive: true });
    document.addEventListener('touchmove',  onTouchMove,  { passive: false });
    document.addEventListener('touchend',   onTouchEnd,   { passive: true });
    return () => {
      document.removeEventListener('touchstart', onTouchStart);
      document.removeEventListener('touchmove',  onTouchMove);
      document.removeEventListener('touchend',   onTouchEnd);
    };
  }, []); // stable — all mutable state accessed via refs

  return { pullY, refreshing, atThreshold: pullY >= THRESHOLD };
}

// ─── status pill ─────────────────────────────────────────────────────────────
function StatusPill({ status }) {
  if (!status) return <span className="status-pill bg-gray-700 text-gray-400">Loading…</span>;
  const on = status.active === 1;
  const heating = status.heatOn;
  const tempF = status.temperatureF ?? cToF(status.temperature);
  if (!status.online) return <span className="status-pill bg-gray-700 text-gray-400">Offline</span>;
  if (on && heating) return <span className="status-pill bg-orange-900 text-orange-300">🔥 Heating — {fmt(tempF)}°F</span>;
  if (on) return <span className="status-pill bg-amber-900 text-amber-300">♨️ On — {fmt(tempF)}°F</span>;
  return <span className="status-pill bg-gray-700 text-gray-400">💤 Off — {fmt(tempF)}°F</span>;
}

// ─── timeline ────────────────────────────────────────────────────────────────
// ─── day strip ───────────────────────────────────────────────────────────────
// Thin horizontal overview bar: 6 AM → midnight, colored blocks, now-line.
function DayStrip({ bookings, members, onSlotClick, onEmptyClick, loading }) {
  const STRIP_START = 6;
  const STRIP_END   = 24;
  const TOTAL_HRS   = STRIP_END - STRIP_START;

  const toFrac = t => {
    const [h, m] = t.split(':').map(Number);
    return Math.max(0, Math.min(1, (h + m / 60 - STRIP_START) / TOTAL_HRS));
  };

  const now = new Date();
  const nowFrac = (now.getHours() + now.getMinutes() / 60 - STRIP_START) / TOTAL_HRS;
  const showNow = nowFrac >= 0 && nowFrac <= 1;

  function handleClick(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const frac = (e.clientX - rect.left) / rect.width;
    const totalMins = (STRIP_START + frac * TOTAL_HRS) * 60;
    const h = Math.floor(totalMins / 60);
    const m = Math.round((totalMins % 60) / 15) * 15;
    onEmptyClick(`${pad(h >= 24 ? 23 : h)}:${pad(m >= 60 ? 45 : m)}`);
  }

  // Hour tick marks: every 3 hours (6, 9, 12, 15, 18, 21, 24)
  const ticks = Array.from({length: TOTAL_HRS + 1}, (_, i) => STRIP_START + i).filter(h => h % 3 === 0);

  return (
    <div className="mb-4">
      <div className="relative bg-gray-800 rounded-xl overflow-hidden cursor-pointer select-none"
        style={{height: 44}} onClick={handleClick}>

        {/* hour ticks */}
        {ticks.map(h => (
          <div key={h} className="absolute top-0 bottom-0 pointer-events-none"
            style={{left: `${((h - STRIP_START) / TOTAL_HRS) * 100}%`}}>
            <div className="w-px h-2 bg-gray-600/80 mt-auto" style={{marginTop: 26}} />
          </div>
        ))}

        {/* booking blocks */}
        {!loading && bookings.map(b => {
          const left  = toFrac(b.start_time);
          // Midnight-spanning: end_time < start_time → block goes to right edge
          const rightT = b.end_time < b.start_time ? '24:00' : b.end_time;
          const right = b.end_time < b.start_time ? 1 : toFrac(b.end_time);
          if (left >= 1) return null;
          const bMember = members.find(m => m.id === b.member_id);
          const color = bMember?.color || b.member_color || '#6B7280';
          return (
            <div key={b.id}
              className="absolute top-1.5 bottom-1.5 rounded cursor-pointer transition-opacity hover:opacity-100"
              style={{
                left: `${left * 100}%`,
                width: `${Math.max(0.01, right - left) * 100}%`,
                background: color + 'aa',
                borderLeft: `2px solid ${color}`,
                opacity: b.status === 'cancelled' ? 0.3 : 0.85,
              }}
              onClick={e => { e.stopPropagation(); onSlotClick(b); }}
            />
          );
        })}

        {/* loading shimmer */}
        {loading && <div className="absolute inset-0 bg-gray-700/50 animate-pulse" />}

        {/* now indicator */}
        {showNow && (
          <div className="absolute top-0 bottom-0 w-0.5 bg-orange-400 z-10 pointer-events-none"
            style={{left: `${nowFrac * 100}%`}} />
        )}
      </div>

      {/* axis labels */}
      <div className="flex justify-between text-[9px] text-gray-600 mt-0.5 px-0.5 pointer-events-none select-none">
        <span>6 AM</span><span>9</span><span>Noon</span><span>3 PM</span><span>6 PM</span><span>9</span><span>Mid</span>
      </div>
    </div>
  );
}

// ─── booking card ─────────────────────────────────────────────────────────────
function BookingCard({ booking: b, member, onPress, onPreheat, canPreheat }) {
  const color = member?.color || b.member_color || '#6B7280';
  const statusCls = {
    active:     'bg-green-800/80 text-green-300',
    preheating: 'bg-orange-900/80 text-orange-300',
    completed:  'bg-gray-700 text-gray-500',
    cancelled:  'bg-red-950 text-red-400',
    scheduled:  'bg-gray-700/80 text-gray-300',
  };
  const isPulsing = b.status === 'active' || b.status === 'preheating';

  // Format "23:00 – 01:00 (next day)" for midnight-spanning
  const timeLabel = b.end_time < b.start_time
    ? `${fmtTime(b.start_time)} – ${fmtTime(b.end_time)} (next day)`
    : `${fmtTime(b.start_time)} – ${fmtTime(b.end_time)}`;

  return (
    <div className="bg-gray-800 rounded-2xl overflow-hidden cursor-pointer active:bg-gray-750 transition-colors fade-in"
      style={{borderLeft: `4px solid ${color}`}}
      onClick={onPress}>
      <div className="px-4 py-3 flex items-center gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-0.5 flex-wrap">
            <span className="font-bold text-sm leading-none" style={{color}}>{b.member_name}</span>
            <span className={`text-[10px] px-2 py-0.5 rounded-full font-semibold capitalize leading-none ${statusCls[b.status] || statusCls.scheduled} ${isPulsing ? 'pulse' : ''}`}>
              {b.status}
            </span>
          </div>
          <div className="text-white font-semibold text-sm">{timeLabel}</div>
          <div className="text-xs text-gray-500 mt-0.5">{fmt(cToF(b.target_temp))}°F · {b.on_time} min</div>
        </div>
        {canPreheat && (
          <button
            onClick={e => { e.stopPropagation(); onPreheat(); }}
            className="flex-shrink-0 bg-orange-500 hover:bg-orange-400 active:bg-orange-600 text-white text-xs font-bold px-3 py-2 rounded-xl transition-colors">
            🔥 Preheat
          </button>
        )}
      </div>
    </div>
  );
}

// ─── day row (stacked week view) ──────────────────────────────────────────────
function DayRow({ date, bookings, members, expanded, onToggle, onSlotClick, onEmptyClick, onCardPress, onPreheat, loading }) {
  const todayIso = localDate(new Date());
  const isToday  = date === todayIso;
  const d        = new Date(date + 'T12:00:00');
  const dayLabel = isToday
    ? 'Today'
    : d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const count = bookings.length;

  return (
    <div className="rounded-2xl overflow-hidden mb-3" style={{background:'rgba(31,41,55,0.6)'}}>
      {/* header row — tap to expand/collapse */}
      <div className="flex items-center gap-3 px-4 pt-3 pb-1 cursor-pointer select-none" onClick={onToggle}>
        <div className="flex-1 flex items-center gap-2 flex-wrap">
          <span className={`font-bold text-sm ${isToday ? 'text-orange-400' : 'text-white'}`}>{dayLabel}</span>
          {count > 0 && (
            <span className="bg-gray-700 text-gray-400 text-[10px] font-semibold px-2 py-0.5 rounded-full leading-none">
              {count} session{count !== 1 ? 's' : ''}
            </span>
          )}
        </div>
        <span className={`text-gray-500 text-xs transition-transform duration-200 inline-block ${expanded ? 'rotate-180' : ''}`}>▾</span>
      </div>

      {/* timeline strip — always visible */}
      <div className="px-4 pb-2">
        <DayStrip
          bookings={bookings}
          members={members}
          onSlotClick={onSlotClick}
          onEmptyClick={onEmptyClick}
          loading={loading}
        />
      </div>

      {/* booking cards — shown when expanded */}
      {expanded && (
        <div className="px-4 pb-3 space-y-2">
          {loading ? (
            <><Skeleton className="h-20" /><Skeleton className="h-20" /></>
          ) : count > 0 ? (
            bookings.map(b => {
              const bMember   = members.find(m => m.id === b.member_id);
              const minsUntil = (new Date(`${b.date}T${b.start_time}`) - new Date()) / 60000;
              const canPreheat = b.status === 'scheduled' && minsUntil <= 90 && minsUntil > 0;
              return (
                <BookingCard
                  key={b.id}
                  booking={b}
                  member={bMember}
                  onPress={() => onCardPress(b)}
                  onPreheat={() => onPreheat(b.id)}
                  canPreheat={canPreheat}
                />
              );
            })
          ) : (
            <p className="text-center text-gray-600 text-sm py-4">No sessions — tap the timeline to add one</p>
          )}
        </div>
      )}
    </div>
  );
}

// ─── help modal ───────────────────────────────────────────────────────────────
function HelpModal({ onClose }) {
  const faqs = [
    {
      q: 'How do I book a session?',
      a: 'Tap the + button or tap anywhere on a day\'s timeline. Pick your date, start time, duration, and target temperature, then tap Review → Confirm. Your session will appear on the schedule.',
    },
    {
      q: 'How do I change or cancel a booking?',
      a: 'Tap any booking card on the schedule to open its details. From there you can edit the time, duration, or temperature, or cancel the session entirely.',
    },
    {
      q: 'When do the controls unlock?',
      a: 'The Controls tab unlocks when you have an active session or one starting within the next 90 minutes. Outside that window the controls are locked. You can also trigger preheat directly from a booking card once you\'re within the 90-minute window.',
    },
    {
      q: 'What are presets?',
      a: 'Presets are quick-start shortcuts on the Controls tab — each one has a name, a target temperature, and a duration. Tap one to instantly apply those settings without adjusting sliders manually.',
    },
    {
      q: 'How do I add or edit presets?',
      a: 'Presets can be added, edited, or deleted from the Admin tab. Only admins can manage presets.',
    },
    {
      q: 'How do I add a new member?',
      a: 'New members sign up from the login screen. They\'ll show as pending until an admin approves them from the Admin tab. Each member gets their own colour, default temperature, and default session length.',
    },
    {
      q: 'What can admins do?',
      a: 'Admins can approve or reject new sign-ups, set a max temperature limit per member, toggle admin rights, manage presets, and access the database browser for direct data edits.',

  return (

        {/* header */}
        <div className="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-700 flex-shrink-0">
          <h2 className="text-lg font-bold">FAQ</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-white text-xl leading-none p-1">✕</button>
        </div>
        {/* scrollable body */}
        <div className="overflow-y-auto px-6 py-4 space-y-5">
          {faqs.map((f, i) => (
            <div key={i}>
              <p className="font-bold text-sm text-white mb-1">{f.q}</p>
              <p className="text-sm text-gray-400 leading-relaxed">{f.a}</p>
            </div>
          ))}
          <div className="pb-2" />
        </div>
      </div>

// ─── booking modal ────────────────────────────────────────────────────────────
function BookingModal({ defaultTime, defaultDate, members, bookings, onClose, onSave, editingBooking, bookingWindowDays = 7 }) {
  const now = new Date();
  const isEditing = !!editingBooking;

  const [memberId, setMemberId] = useState(isEditing ? editingBooking.member_id : (members[0]?.id || ''));
  const [startTime, setStartTime] = useState(isEditing ? editingBooking.start_time : (defaultTime || timeStr(now)));
  const [durationMins, setDurationMins] = useState(isEditing ? editingBooking.on_time : 60);
  const [tempF, setTempF] = useState(isEditing ? cToF(editingBooking.target_temp) : 194);
  const [bookingDate, setBookingDate] = useState(isEditing ? editingBooking.date : (defaultDate || localDate(now)));

  const todayIso  = localDate(now);
  const isToday   = bookingDate === todayIso;
  const isPastTime = !isEditing && isToday && startTime < timeStr(now);

  // Validate time field — browsers with no native time picker can accept nonsense
  const [_th, _tm] = startTime ? startTime.split(':').map(Number) : [NaN, NaN];
  const isInvalidTime = isNaN(_th) || isNaN(_tm) || _th > 23 || _tm > 59;

  const endTime = (() => {
    const [h,m] = startTime.split(':').map(Number);
    const total = h*60 + m + durationMins;
    return `${pad(Math.floor(total/60)%24)}:${pad(total%60)}`;
  })();

  const selectedMember = members.find(m => m.id === Number(memberId));
  const memberMaxTempF = selectedMember?.max_temp ? cToF(selectedMember.max_temp) : 230;
  const effectiveTempF = Math.min(tempF, memberMaxTempF);

  const [confirming, setConfirming] = useState(false);

  async function handleConfirm() {
    // Re-check at submit time — user may have lingered past the start time
    if (!isEditing && isToday && startTime < timeStr(new Date())) {
      setConfirming(false);
      return;
    }
    await onSave({
      member_id: Number(memberId),
      date: bookingDate,
      start_time: startTime,
      end_time: endTime,
      target_temp: fToC(effectiveTempF),
      on_time: durationMins,
    });
  }

  // ── Confirmation screen ────────────────────────────────────────────────────
  if (confirming) {
    const fmtDate = new Date(bookingDate + 'T12:00:00').toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
    const fmtStart = new Date(`${bookingDate}T${startTime}`).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    const fmtEnd   = new Date(`${bookingDate}T${endTime}`).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    const color = selectedMember?.color || '#f97316';
    return (
      <div className="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center p-4" onClick={onClose}>
        <div className="bg-gray-800 rounded-2xl w-full max-w-sm p-6 fade-in" onClick={e=>e.stopPropagation()}>
          <h2 className="text-lg font-bold mb-1">Confirm Booking</h2>
          <p className="text-xs text-gray-500 mb-5">Double-check before saving</p>
          <div className="bg-gray-750 rounded-2xl overflow-hidden mb-5" style={{borderLeft: `4px solid ${color}`}}>
            <div className="px-4 py-4 space-y-2">
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background: color}} />
                <span className="font-bold" style={{color}}>{selectedMember?.name}</span>
              </div>
              <div className="text-white font-semibold">{fmtDate}</div>
              <div className="text-gray-300 text-sm">
                {fmtStart} – {fmtEnd}{endTime <= startTime ? <span className="text-orange-400 ml-1">(next day)</span> : null}
                <span className="text-gray-500 ml-2">· {durationMins} min</span>
              </div>
              <div className="text-gray-300 text-sm">{effectiveTempF}°F ({fToC(effectiveTempF)}°C)</div>
            </div>
          </div>
          <div className="flex gap-3">
            <button onClick={() => setConfirming(false)} className="flex-1 bg-gray-700 text-gray-300 py-3 rounded-xl font-semibold">← Back</button>
            <button onClick={handleConfirm} style={{background: color}} className="flex-1 text-white py-3 rounded-xl font-bold">
              {isEditing ? '✓ Save Changes' : '✓ Confirm'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── Form screen ────────────────────────────────────────────────────────────
  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center p-4" onClick={onClose}>
      <div className="bg-gray-800 rounded-2xl w-full max-w-sm p-6 fade-in" onClick={e=>e.stopPropagation()}>
        <h2 className="text-lg font-bold mb-4">{isEditing ? 'Edit Session' : 'Book a Session'}</h2>

        {/* date — day button strip */}
        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wide">Date</label>
          <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
            {Array.from({length: bookingWindowDays}, (_, i) => {
              const d = new Date(); d.setDate(d.getDate() + i);
              const iso = localDate(d);
              const active = bookingDate === iso;
              return (
                <button key={iso} type="button" onClick={() => setBookingDate(iso)}
                  className={`flex-shrink-0 flex flex-col items-center px-3 py-2 rounded-xl text-xs font-semibold transition-all ${active ? 'bg-orange-500 text-white' : 'bg-gray-700 text-gray-400'}`}>
                  <span className="uppercase tracking-wide text-[10px]">{i === 0 ? 'Today' : d.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'})}</span>
                  <span className="text-base font-black leading-tight">{d.getDate()}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* start time */}
        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wide">Start time</label>
          <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)}
            className={`w-full block bg-gray-700 rounded-xl px-4 py-2.5 text-white text-base font-semibold ${isPastTime || isInvalidTime ? 'ring-2 ring-red-500' : ''}`} />
          {isInvalidTime && <p className="text-red-400 text-xs mt-1.5">⚠ Invalid time — please enter a valid hour (0–23) and minute</p>}
          {!isInvalidTime && isPastTime && <p className="text-red-400 text-xs mt-1.5">⚠ That time has already passed today</p>}
        </div>

        {/* existing bookings for this date (exclude self when editing) */}
        {bookings && bookings.filter(b => b.date === bookingDate && (!isEditing || b.id !== editingBooking.id)).length > 0 && (
          <div className="mb-4">
            <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wide">Already booked</label>
            <div className="space-y-1">
              {bookings.filter(b => b.date === bookingDate && (!isEditing || b.id !== editingBooking.id)).map(b => (
                <div key={b.id} className="flex items-center gap-2 px-3 py-1.5 bg-gray-700/50 rounded-lg">
                  <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background: b.member_color || '#6B7280'}} />
                  <span className="text-sm text-gray-300 font-medium truncate">{b.member_name}</span>
                  <span className="text-xs text-gray-500 ml-auto flex-shrink-0">{fmtTime(b.start_time)}–{fmtTime(b.end_time)}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* duration */}
        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wide">Duration — {durationMins} min</label>
          <div className="flex gap-2">
            {[30,60,90,120].map(d => (
              <button key={d}
                className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${durationMins===d?'bg-orange-500 text-white':'bg-gray-700 text-gray-300'}`}
                onClick={()=>setDurationMins(d)}>{d}m</button>
            ))}
          </div>
        </div>

        {/* temp */}
        <div className="mb-6">
          <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wide">Temperature — {effectiveTempF}°F ({fToC(effectiveTempF)}°C){selectedMember?.max_temp ? <span className="text-orange-400 ml-1">(max {cToF(selectedMember.max_temp)}°F)</span> : null}</label>
          <input type="range" min={104} max={memberMaxTempF} step={2} value={effectiveTempF} onChange={e=>setTempF(Number(e.target.value))}
            className="w-full h-3" />
          <div className="flex justify-between text-xs text-gray-500 mt-1"><span>104°F</span><span>{memberMaxTempF}°F</span></div>
        </div>

        <div className="text-xs text-gray-500 mb-4">
          Ends at <strong className="text-gray-300">{fmtTime(endTime)}</strong>
          {endTime <= startTime && <span className="text-orange-400 ml-1">(next day)</span>}
        </div>

        <div className="flex gap-3">
          <button onClick={onClose} className="flex-1 bg-gray-700 text-gray-300 py-3 rounded-xl font-semibold">Cancel</button>
          <button onClick={() => setConfirming(true)} disabled={isPastTime || isInvalidTime}
            style={{background: (isPastTime || isInvalidTime) ? undefined : (selectedMember?.color || '#f97316')}}
            className={`flex-1 text-white py-3 rounded-xl font-bold transition-opacity ${isPastTime || isInvalidTime ? 'bg-gray-600 opacity-50 cursor-not-allowed' : ''}`}>
            {isEditing ? 'Review Changes' : 'Review →'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── slot detail modal ────────────────────────────────────────────────────────
function SlotModal({ booking, onClose, onCancel, onPreheat, onEdit, currentMember }) {
  const now = new Date();
  const bookingStart = new Date(`${booking.date}T${booking.start_time}`);
  const minsUntil = (bookingStart - now) / 60000;
  const isOwner = currentMember?.id === booking.member_id || currentMember?.is_admin;
  const canPreheat = booking.status === 'scheduled' && minsUntil <= 90 && minsUntil > 0 && isOwner;
  const [confirmCancel, setConfirmCancel] = useState(false);
  const canEdit = booking.status === 'scheduled' && isOwner;
  const color = booking.member_color || '#f97316';

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center p-4" onClick={onClose}>
      <div className="bg-gray-800 rounded-2xl w-full max-w-sm p-6 fade-in" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 mb-4">
          <div className="w-4 h-4 rounded-full" style={{background: color}} />
          <h2 className="text-lg font-bold">{booking.member_name}'s Session</h2>
        </div>
        <div className="space-y-2 text-sm text-gray-300 mb-6">
          <div>{booking.date} · {fmtTime(booking.start_time)}–{fmtTime(booking.end_time)}{booking.end_time < booking.start_time ? ' (next day)' : ''}</div>
          <div>Temp: {cToF(booking.target_temp)}°F ({booking.target_temp}°C)</div>
          <div>Duration: {booking.on_time} min</div>
          <div className="capitalize">Status: <span className="font-semibold text-white">{booking.status}</span></div>
        </div>
        <div className="flex flex-col gap-3">
          {canPreheat && (
            <button onClick={()=>onPreheat(booking.id)}
              className="w-full bg-orange-500 hover:bg-orange-400 text-white py-3 rounded-xl font-bold text-base">
              🔥 Start Preheat
            </button>
          )}
          {canEdit && (
            <button onClick={()=>onEdit(booking)}
              className="w-full bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-xl font-semibold">
              ✏️ Edit Booking
            </button>
          )}
          {booking.status !== 'completed' && booking.status !== 'cancelled' && isOwner && (
            confirmCancel ? (
              <div className="space-y-2">
                <div className="text-sm text-center text-gray-300">Cancel this booking?</div>
                <div className="flex gap-2">
                  <button onClick={()=>setConfirmCancel(false)}
                    className="flex-1 bg-gray-700 text-gray-300 py-3 rounded-xl font-semibold">Keep it</button>
                  <button onClick={()=>onCancel(booking.id)}
                    className="flex-1 bg-red-700 hover:bg-red-600 text-white py-3 rounded-xl font-semibold">Yes, cancel</button>
                </div>
              </div>
            ) : (
              <button onClick={()=>setConfirmCancel(true)}
                className="w-full bg-red-900 hover:bg-red-800 text-red-300 py-3 rounded-xl font-semibold">
                Cancel Booking
              </button>
            )
          )}
          <button onClick={onClose} className="w-full bg-gray-700 text-gray-300 py-3 rounded-xl font-semibold">Close</button>
        </div>
      </div>
    </div>
  );
}

// ─── members panel ────────────────────────────────────────────────────────────
const PALETTE = ['#F97316','#EF4444','#3B82F6','#10B981','#8B5CF6','#EC4899','#F59E0B','#06B6D4'];

function MembersPanel({ members, onReload, currentMember }) {
  const isAdmin = currentMember?.is_admin;
  const [adding, setAdding] = useState(false);
  const [name, setName] = useState('');
  const [color, setColor] = useState(PALETTE[0]);
  const [tempF, setTempF] = useState(194);
  const [duration, setDuration] = useState(60);
  const [editingId, setEditingId] = useState(null);
  const [editTempF, setEditTempF] = useState(194);
  const [editDuration, setEditDuration] = useState(60);
  // password change
  const [pwChangeOpen, setPwChangeOpen]     = useState(false);
  const [pwCurrent, setPwCurrent]           = useState('');
  const [pwNew, setPwNew]                   = useState('');
  const [pwConfirm, setPwConfirm]           = useState('');
  const [pwError, setPwError]               = useState('');
  const [pwSuccess, setPwSuccess]           = useState(false);
  // Booking history
  const [history, setHistory] = useState(null);
  const [stats, setStats] = useState(null);
  const [historyLoading, setHistoryLoading] = useState(false);

  async function handleAdd() {
    if (!name.trim()) return;
    await api('/api/admin/members', {method:'POST', body:{name:name.trim(), default_temp:fToC(tempF), default_time:duration, color}});
    setAdding(false); setName('');
    onReload();
  }

  async function handleDelete(id) {
    if (!confirm('Remove this member and all their bookings?')) return;
    await api(`/api/admin/members/${id}`, {method:'DELETE'});
    onReload();
  }

  function startEdit(m) {
    setEditingId(m.id);
    setEditTempF(cToF(m.default_temp));
    setEditDuration(m.default_time);
    setPwChangeOpen(false);
    setPwSuccess(false);
    setPwError('');
  }

  async function handleSaveEdit(id) {
    try {
      await api(`/api/members/${id}`, {method:'PUT', body:{default_temp: fToC(editTempF), default_time: editDuration}});
      setEditingId(null);
      onReload();
    } catch(e) { alert(e.message); }
  }

  async function handleChangePassword(e, memberId) {
    e.preventDefault();
    if (pwNew !== pwConfirm) { setPwError('Passwords don\'t match'); return; }
    if (pwNew.length < 8)    { setPwError('New password must be at least 8 characters'); return; }
    setPwError('');
    try {
      await api(`/api/members/${memberId}/change-password`, {
        method: 'POST',
        body: { current_password: pwCurrent, new_password: pwNew },
      });
      setPwChangeOpen(false);
      setPwCurrent(''); setPwNew(''); setPwConfirm('');
      setPwSuccess(true);
    } catch(e) {
      setPwError(e.message);
    }
  }

  async function loadHistory() {
    if (!currentMember) return;
    setHistoryLoading(true);
    try {
      const [h, s] = await Promise.all([
        api(`/api/bookings/history?member_id=${currentMember.id}`),
        api(`/api/members/${currentMember.id}/stats`),
      ]);
      setHistory(h);
      setStats(s);
    } catch(e) { alert(e.message); }
    finally { setHistoryLoading(false); }
  }

  return (
    <>
      <div className="bg-gray-800 rounded-2xl p-5">
        <div className="flex justify-between items-center mb-4">
          <h2 className="font-bold text-base">Family Members</h2>
          {isAdmin && (
            <button onClick={()=>setAdding(!adding)} className="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 px-3 py-1.5 rounded-lg font-semibold">
              {adding ? 'Cancel' : '+ Add'}
            </button>
          )}
        </div>

        {adding && isAdmin && (
          <div className="border border-gray-700 rounded-xl p-4 mb-4 fade-in">
            <input placeholder="Name" value={name} onChange={e=>setName(e.target.value)}
              className="w-full bg-gray-700 rounded-lg px-3 py-2 text-white mb-3" />
            <div className="flex flex-wrap gap-2 mb-3">
              {PALETTE.map(c => (
                <button key={c} onClick={()=>setColor(c)}
                  className={`w-7 h-7 rounded-full ${color===c?'ring-2 ring-white ring-offset-2 ring-offset-gray-800':''}`}
                  style={{background:c}} />
              ))}
            </div>
            <div className="text-xs text-gray-400 mb-1">Default temp: {tempF}°F</div>
            <input type="range" min={104} max={230} step={2} value={tempF} onChange={e=>setTempF(Number(e.target.value))} className="w-full mb-3" />
            <div className="text-xs text-gray-400 mb-1">Default duration: {duration} min</div>
            <div className="flex gap-2 mb-4">
              {[30,60,90,120].map(d=>(
                <button key={d} onClick={()=>setDuration(d)}
                  className={`flex-1 py-1.5 rounded-lg text-xs font-semibold ${duration===d?'bg-orange-500 text-white':'bg-gray-700 text-gray-300'}`}>{d}m</button>
              ))}
            </div>
            <button onClick={handleAdd} className="w-full py-2 rounded-xl font-bold text-white" style={{background:color}}>Add {name||'Member'}</button>
          </div>
        )}

        <div className="space-y-2">
          {members.map(m => {
            const canEdit = isAdmin || m.id === currentMember?.id;
            const isEditing = editingId === m.id;
            const isMe = m.id === currentMember?.id;
            return (
              <div key={m.id} className="bg-gray-700/50 rounded-xl overflow-hidden">
                <div className="flex items-center justify-between px-4 py-3">
                  <div className="flex items-center gap-3">
                    <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background:m.color}} />
                    <div>
                      <div className="font-semibold">
                        {m.name}
                        {isMe && <span className="text-xs text-gray-500 ml-1.5">(you)</span>}
                      </div>
                      <div className="text-xs text-gray-400">{cToF(m.default_temp)}°F · {m.default_time} min</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    {canEdit && (
                      <button onClick={() => isEditing ? setEditingId(null) : startEdit(m)}
                        className="text-xs text-gray-500 hover:text-orange-400 font-semibold px-2 py-1 rounded-lg hover:bg-gray-700 transition-colors">
                        {isEditing ? 'Cancel' : 'Edit'}
                      </button>
                    )}
                    {isAdmin && !isMe && (
                      <button onClick={() => handleDelete(m.id)} className="text-gray-600 hover:text-red-400 text-lg leading-none ml-1">×</button>
                    )}
                  </div>
                </div>

                {isEditing && (
                  <div className="px-4 pb-4 pt-2 border-t border-gray-600/50 fade-in">
                    <div className="text-xs text-gray-400 mb-1">Default temp: <span className="text-white font-semibold">{editTempF}°F ({fToC(editTempF)}°C)</span></div>
                    <input type="range" min={104} max={230} step={2} value={editTempF}
                      onChange={e=>setEditTempF(Number(e.target.value))} className="w-full mb-3" />
                    <div className="text-xs text-gray-400 mb-2">Default duration</div>
                    <div className="flex gap-2 mb-4">
                      {[30,60,90,120].map(d=>(
                        <button key={d} onClick={()=>setEditDuration(d)}
                          className={`flex-1 py-1.5 rounded-lg text-xs font-semibold ${editDuration===d?'bg-orange-500 text-white':'bg-gray-700 text-gray-300'}`}>{d}m</button>
                      ))}
                    </div>
                    <button onClick={() => handleSaveEdit(m.id)}
                      className="w-full py-2 rounded-xl font-bold text-white bg-orange-500 hover:bg-orange-400 transition-colors">
                      Save preferences
                    </button>
                    {isMe && (
                      <div className="mt-3 pt-3 border-t border-gray-600/50">
                        {!pwChangeOpen ? (
                          <>
                            {pwSuccess && <p className="text-green-400 text-xs text-center mb-2">✓ Password changed successfully</p>}
                            <button onClick={() => { setPwChangeOpen(true); setPwSuccess(false); setPwError(''); setPwCurrent(''); setPwNew(''); setPwConfirm(''); }}
                              className="w-full py-2 rounded-xl text-sm font-semibold text-gray-300 bg-gray-700 hover:bg-gray-600 transition-colors">
                              🔒 Change password
                            </button>
                          </>
                        ) : (
                          <div className="fade-in">
                            <div className="flex justify-between items-center mb-3">
                              <span className="text-sm font-semibold text-white">Change password</span>
                              <button onClick={() => setPwChangeOpen(false)} className="text-xs text-gray-500 hover:text-gray-300">cancel</button>
                            </div>
                            <form onSubmit={e => handleChangePassword(e, m.id)} className="space-y-2">
                              <input type="password" placeholder="Current password" value={pwCurrent} onChange={e => setPwCurrent(e.target.value)} required
                                autoComplete="current-password"
                                className="w-full bg-gray-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:ring-2 focus:ring-orange-500" />
                              <input type="password" placeholder="New password (min 8 chars)" value={pwNew} onChange={e => setPwNew(e.target.value)} required
                                autoComplete="new-password"
                                className="w-full bg-gray-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:ring-2 focus:ring-orange-500" />
                              <input type="password" placeholder="Confirm new password" value={pwConfirm} onChange={e => setPwConfirm(e.target.value)} required
                                autoComplete="new-password"
                                className="w-full bg-gray-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:ring-2 focus:ring-orange-500" />
                              {pwError && <p className="text-red-400 text-xs text-center">{pwError}</p>}
                              <button type="submit"
                                className="w-full py-2 rounded-xl font-bold text-white bg-orange-500 hover:bg-orange-400 transition-colors">
                                Update password
                              </button>
                            </form>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
          {members.length === 0 && <p className="text-gray-500 text-sm">No members yet.</p>}
        </div>
      </div>

      {currentMember && (
        <div className="bg-gray-800 rounded-2xl p-5">
          <div className="flex justify-between items-center mb-4">
            <h2 className="font-bold text-base">My History</h2>
            <button onClick={loadHistory} disabled={historyLoading}
              className="text-xs text-gray-500 hover:text-gray-300 disabled:opacity-50">
              {historyLoading ? '…' : history ? '↻ Refresh' : 'Load'}
            </button>
          </div>
          {!history && !historyLoading && (
            <p className="text-gray-500 text-sm text-center py-4">Tap Load to view your session history</p>
          )}
          {historyLoading && <div className="text-center text-gray-500 text-sm py-4 pulse">Loading…</div>}
          {stats && (
            <div className="grid grid-cols-3 gap-3 mb-4">
              <div className="bg-gray-700/50 rounded-xl p-3 text-center">
                <div className="text-2xl font-black text-orange-400">{stats.total_sessions}</div>
                <div className="text-xs text-gray-400 mt-1">Sessions</div>
              </div>
              <div className="bg-gray-700/50 rounded-xl p-3 text-center">
                <div className="text-2xl font-black text-orange-400">{stats.total_hours}</div>
                <div className="text-xs text-gray-400 mt-1">Hours</div>
              </div>
              <div className="bg-gray-700/50 rounded-xl p-3 text-center">
                <div className="text-2xl font-black text-orange-400">{stats.favourite_temp_f != null ? stats.favourite_temp_f + '°' : '—'}</div>
                <div className="text-xs text-gray-400 mt-1">Fav temp</div>
              </div>
            </div>
          )}
          {history && history.length === 0 && (
            <p className="text-gray-500 text-sm text-center py-2">No completed sessions yet</p>
          )}
          {history && history.length > 0 && (
            <div className="space-y-2">
              {history.map(b => {
                const d = new Date(b.date + 'T12:00:00');
                const dateLabel = d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
                const statusColor = b.status === 'completed' ? 'text-green-400' : 'text-gray-500';
                return (
                  <div key={b.id} className="flex items-center justify-between px-3 py-2.5 bg-gray-700/50 rounded-xl">
                    <div>
                      <div className="text-sm font-semibold text-white">{dateLabel}</div>
                      <div className="text-xs text-gray-400">{fmtTime(b.start_time)}–{fmtTime(b.end_time)} · {b.on_time} min · {cToF(b.target_temp)}°F</div>
                    </div>
                    <span className={`text-xs font-semibold capitalize ${statusColor}`}>{b.status}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </>
  );
}

// ─── controls ────────────────────────────────────────────────────────────────
function Controls({ status, statusUpdatedAt, bookings, members, presets = [], currentMember, onRefresh, onBook, toast }) {
  const now = new Date();
  const todayStr = localDate(now);

  const isAdmin = currentMember?.is_admin;

  // Only this user's bookings that are active or starting within 90 min
  const relevantBookings = bookings.filter(b => {
    if (b.member_id !== currentMember?.id) return false;
    if (b.date !== todayStr) return false;
    if (b.status === 'cancelled' || b.status === 'completed') return false;
    const start = new Date(`${b.date}T${b.start_time}`);
    const end   = new Date(`${b.date}T${b.end_time}`);
    return end > now && (start - now) / 60000 <= 90;
  });

  // Admins always unlocked; others need their own booking within 90 min
  const unlocked = isAdmin || relevantBookings.length > 0;

  // Live member profile (always up-to-date from the members list)
  const myProfile = members.find(m => m.id === currentMember?.id);

  // Per-member max temperature (from live profile, fallback to session data)
  const myMaxTempC = myProfile?.max_temp ?? currentMember?.max_temp ?? null;
  const myMaxTempF = myMaxTempC ? cToF(myMaxTempC) : 230;

  // Seed state from booking → live profile → auth session → hardcoded fallback
  const seedTemp = relevantBookings[0]?.target_temp ?? myProfile?.default_temp ?? currentMember?.default_temp ?? 90;
  const seedDur  = relevantBookings[0]?.on_time    ?? myProfile?.default_time  ?? currentMember?.default_time  ?? 60;

  const [tempF, setTempF] = useState(Math.min(cToF(seedTemp), myMaxTempF));
  const [duration, setDuration] = useState(seedDur);

  // Re-sync sliders when bookings or member profile loads/changes,
  // but only if the user hasn't manually adjusted the sliders.
  // Priority: booking values > profile defaults.
  const [manuallySet, setManuallySet] = useState(false);
  useEffect(() => {
    if (manuallySet) return;
    if (relevantBookings.length > 0) {
      const b = relevantBookings[0];
      setTempF(Math.min(cToF(b.target_temp), myMaxTempF));
      setDuration(b.on_time);
    } else if (myProfile) {
      setTempF(cToF(myProfile.default_temp));
      setDuration(myProfile.default_time);
    }
  }, [relevantBookings[0]?.id, relevantBookings[0]?.target_temp, relevantBookings[0]?.on_time, myProfile?.default_temp, myProfile?.default_time]);

  // Fetch status once when controls become unlocked. After that, only refresh
  // on button press or manual tap — never poll automatically.
  useEffect(() => {
    if (!unlocked) return;
    onRefresh();
  }, [unlocked]);
  const [loading, setLoading] = useState(false);

  // Ticking clock for "updated X min ago" — only re-renders every 30s, no API calls
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setTick(n => n + 1), 30000);
    return () => clearInterval(t);
  }, []);
  const minsAgo = statusUpdatedAt ? Math.floor((Date.now() - statusUpdatedAt.getTime()) / 60000) : null;
  const isStale = minsAgo !== null && minsAgo >= 5;
  const updatedLabel = minsAgo === null ? 'Tap to load status'
    : minsAgo === 0 ? 'Just updated'
    : `Updated ${minsAgo} min ago`;

  const sauna_on = status?.active === 1;

  // Find whose session is currently active (any member)
  const activeSessionBooking = sauna_on ? bookings.find(b => {
    if (b.date !== todayStr) return false;
    if (b.status === 'cancelled' || b.status === 'completed') return false;
    const start = new Date(`${b.date}T${b.start_time}`);
    const end   = new Date(`${b.date}T${b.end_time}`);
    return start <= now && end > now;
  }) ?? bookings.find(b =>
    b.date === todayStr && (b.status === 'active' || b.status === 'preheating')
  ) : null;

  async function handleToggle() {
    setLoading(true);
    try {
      if (sauna_on) {
        await api('/api/sauna/off', {method:'POST'});
        toast('Sauna turned off', 'info');
      } else {
        await api('/api/sauna/on', {method:'POST', body:{targetTempF: Math.min(tempF, myMaxTempF), onTime: duration}});
        toast('Sauna is heating up!', 'success');
      }
      setTimeout(onRefresh, 1500);
    } catch(e) {
      toast(e.message, 'error');
    } finally { setLoading(false); }
  }

  const [bookingNow, setBookingNow] = useState(false);

  async function handleBookNow() {
    setBookingNow(true);
    try {
      const startDate = new Date();
      const endDate   = new Date(startDate.getTime() + seedDur * 60000);
      const cappedTempC = myMaxTempC ? Math.min(seedTemp, myMaxTempC) : seedTemp;
      await api('/api/bookings', {method:'POST', body:{
        date:        todayStr,
        start_time:  timeStr(startDate),
        end_time:    timeStr(endDate),
        target_temp: cappedTempC,
        on_time:     seedDur,
      }});
      toast('Session booked!', 'success');
      await api('/api/sauna/on', {method:'POST', body:{targetTempF: cToF(cappedTempC), onTime: seedDur}});
      toast('Sauna is heating up! 🔥', 'success');
      if (onBook) onBook();
      setTimeout(onRefresh, 1500);
    } catch(e) {
      toast(e.message, 'error');
    } finally { setBookingNow(false); }
  }

  async function handlePreset(name) {
    setLoading(true);
    try {
      await api(`/api/sauna/preset/${name}`, {method:'POST'});
      const p = presets.find(x => x.name === name);
      toast(`${p?.label || name} started!`, 'success');
      setTimeout(onRefresh, 1500);
    } catch(e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  const currentTempF = status?.temperatureF ?? cToF(status?.temperature);
  const targetTempF  = status?.targetTempF  ?? cToF(status?.targetTemp);
  const remaining = status?.remainingTime;

  return (
    <>
    {/* Book Now quick action — only shown when controls are locked */}
    {!unlocked && !isAdmin && (
      <div className="bg-gray-800 rounded-2xl p-5 mb-4">
        <h2 className="font-bold text-base mb-1">Quick Start</h2>
        <p className="text-sm text-gray-400 mb-4">Books a session starting now and turns the sauna on — no form needed.</p>
        <button onClick={handleBookNow} disabled={bookingNow}
          className="w-full bg-orange-500 hover:bg-orange-400 active:bg-orange-600 text-white py-3.5 rounded-xl font-bold text-base transition-all disabled:opacity-50">
          {bookingNow ? <span className="pulse">…</span> : '🔥 Book & Start Now'}
        </button>
        <div className="text-xs text-gray-500 mt-2.5 text-center">
          {cToF(seedTemp)}°F{myMaxTempC && seedTemp > myMaxTempC ? ` (capped at ${cToF(myMaxTempC)}°F)` : ''} · {seedDur} min · uses your defaults
        </div>
      </div>
    )}
    <div className={`bg-gray-800 rounded-2xl p-5 transition-opacity ${!unlocked?'opacity-50 pointer-events-none':''}`}>
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-bold text-base">Sauna Controls</h2>
        {!unlocked && <span className="text-xs bg-gray-700 text-gray-400 px-3 py-1 rounded-full">🔒 Book a session to unlock</span>}
      </div>

      {/* live readings — tap anywhere on the grid to refresh */}
      <button onClick={onRefresh} className="w-full text-left mb-1 group" disabled={loading}>
        <div className="grid grid-cols-3 gap-3">
          <div className="bg-gray-700/60 group-hover:bg-gray-700 rounded-xl p-3 text-center transition-colors">
            <div className="text-xl font-bold text-orange-400">{currentTempF != null ? `${currentTempF}°F` : '—'}</div>
            <div className="text-xs text-gray-400 mt-0.5">Current</div>
          </div>
          <div className="bg-gray-700/60 group-hover:bg-gray-700 rounded-xl p-3 text-center transition-colors">
            <div className="text-xl font-bold text-red-400">{targetTempF != null ? `${targetTempF}°F` : '—'}</div>
            <div className="text-xs text-gray-400 mt-0.5">Target</div>
          </div>
          <div className="bg-gray-700/60 group-hover:bg-gray-700 rounded-xl p-3 text-center transition-colors">
            <div className="text-xl font-bold text-amber-300">{remaining != null ? `${remaining}m` : '—'}</div>
            <div className="text-xs text-gray-400 mt-0.5">Remaining</div>
          </div>
        </div>
        <div className={`text-xs mt-1.5 text-center ${isStale ? 'text-amber-400' : 'text-gray-600'}`}>
          {isStale ? '⚠ ' : ''}{updatedLabel} · tap to refresh
        </div>
        {sauna_on && activeSessionBooking && (
          <div className="mt-2 mb-1 text-xs text-center text-gray-400">
            <span style={{color: activeSessionBooking.member_color || '#f97316'}} className="font-semibold">{activeSessionBooking.member_name}</span>
            {' '}· ends {fmtTime(activeSessionBooking.end_time)}
          </div>
        )}
        <div className="mb-4" />
      </button>

      {/* full-width refresh button */}
      <button onClick={onRefresh} disabled={loading}
        className="w-full flex items-center justify-center gap-2 bg-gray-700 hover:bg-gray-600 active:bg-gray-500 text-gray-200 font-semibold py-3 rounded-xl mb-5 transition-colors disabled:opacity-50">
        <span className={loading ? 'animate-spin' : ''}>↻</span> Refresh Status
      </button>

      {/* presets */}
      {presets.length > 0 && (
        <div className="mb-4">
          <div className="text-sm text-gray-400 mb-2">Quick start</div>
          <div className="flex gap-2 flex-wrap">
            {presets.map(p => {
              const overLimit = myMaxTempC && p.target_temp > myMaxTempC;
              return (
                <button key={p.name} onClick={() => handlePreset(p.name)} disabled={loading || overLimit}
                  title={overLimit ? `Exceeds your ${myMaxTempF}°F limit` : ''}
                  className={`flex flex-col items-center px-3 py-2 rounded-xl text-xs font-semibold transition-colors
                    ${overLimit ? 'bg-gray-800 text-gray-600 cursor-not-allowed' : 'bg-gray-700 hover:bg-orange-900/50 text-gray-300 hover:text-orange-300'}
                    disabled:opacity-50`}>
                  <span>{p.label}</span>
                  <span className="text-gray-500 font-normal mt-0.5">{p.target_temp_f}°F · {p.on_time}m</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* temp slider — only shown when sauna is off (no false affordance while running) */}
      {!sauna_on && (
        <div className="mb-4">
          <div className="flex justify-between text-sm mb-2">
            <span className="text-gray-400">Target temp{myMaxTempC ? <span className="text-xs text-orange-500 ml-1.5">max {myMaxTempF}°F</span> : null}</span>
            <span className="font-bold text-orange-400">{Math.min(tempF, myMaxTempF)}°F <span className="text-gray-500 font-normal">({fToC(Math.min(tempF, myMaxTempF))}°C)</span></span>
          </div>
          <input type="range" min={104} max={myMaxTempF} step={2} value={Math.min(tempF, myMaxTempF)}
            onChange={e=>{ setManuallySet(true); setTempF(Number(e.target.value)); }} className="w-full h-3" />
          <div className="flex justify-between text-xs text-gray-600 mt-1"><span>104°F</span><span>{myMaxTempF}°F</span></div>
        </div>
      )}

      {/* duration — only shown when sauna is off */}
      {!sauna_on && (
        <div className="mb-5">
          <div className="text-sm text-gray-400 mb-2">Duration</div>
          <div className="flex gap-2">
            {[30,60,90,120].map(d=>(
              <button key={d} onClick={()=>{ setManuallySet(true); setDuration(d); }}
                className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${duration===d?'bg-orange-500 text-white':'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>{d}m</button>
            ))}
          </div>
        </div>
      )}

      {/* single action button — Preheat or Turn Off */}
      <button onClick={handleToggle} disabled={loading}
        className={`w-full py-3.5 rounded-xl font-bold text-base transition-all ${sauna_on?'bg-red-700 hover:bg-red-600 text-white':'bg-orange-500 hover:bg-orange-400 text-white'}`}>
        {loading ? <span className="pulse">…</span> : sauna_on ? '⏹ Turn Off' : '🔥 Preheat'}
      </button>
    </div>
    </>
  );
}

// ─── pin pad ─────────────────────────────────────────────────────────────────
function PinPad({ onComplete }) {
  const [digits, setDigits] = useState([]);

  function press(d) {
    if (digits.length >= 4) return;
    const next = [...digits, d];
    setDigits(next);
    if (next.length === 4) {
      setTimeout(() => { onComplete(next.join('')); setDigits([]); }, 150);
    }
  }

  function del() { setDigits(d => d.slice(0, -1)); }

  return (
    <div>
      <div className="flex justify-center gap-4 mb-6">
        {[0,1,2,3].map(i => (
          <div key={i} className={`w-4 h-4 rounded-full transition-all ${i < digits.length ? 'bg-orange-400 scale-110' : 'bg-gray-600'}`} />
        ))}
      </div>
      <div className="grid grid-cols-3 gap-3">
        {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k, i) => (
          <button key={i}
            disabled={k === ''}
            onClick={() => k === '⌫' ? del() : k !== '' ? press(String(k)) : null}
            className={`h-14 rounded-2xl text-xl font-bold transition-all active:scale-95 ${k===''?'invisible':k==='⌫'?'bg-gray-700 text-gray-300 hover:bg-gray-600':'bg-gray-700 hover:bg-gray-600 text-white'}`}>
            {k}
          </button>
        ))}
      </div>
    </div>
  );
}

function MigrateScreen({ onLogin, onBack }) {

  const [loading, setLoading]     = useState(false);

  useEffect(() => {
    api('/api/members')
      .then(all => setMembers(all.filter(m => !m.has_credentials)))
      .catch(() => {});
  }, []);

  function handlePinComplete(enteredPin) {
    setPin(enteredPin);
    setStep('credentials');
  }

  async function handleSubmit(e) {
    e.preventDefault();
    if (password !== confirm) { setError('Passwords don\'t match'); return; }
    if (password.length < 8)  { setError('Password must be at least 8 characters'); return; }
    setLoading(true);
    setError('');

      const { member, csrf_token } = await api('/api/auth/migrate', {method:'POST', body:{member_id: selected.id, pin, email, password}});

      <div className="w-full max-w-sm">
        <button onClick={step === 'pick' ? onBack : () => { setError(''); setStep(step === 'credentials' ? 'pin' : 'pick'); }}
          className="text-gray-400 hover:text-white text-sm mb-6">← Back</button>
        <h2 className="text-2xl font-black mb-2">Migrate your account</h2>
        <p className="text-gray-500 text-sm mb-6">Link email + password to your existing account</p>

        {step === 'pick' && (
          <>

  );
}

// ─── reset password screen ────────────────────────────────────────────────────
function ResetPasswordScreen({ token, onLogin, onForgot }) {
  const [password, setPassword] = useState('');
  const [confirm, setConfirm]   = useState('');
  const [error, setError]       = useState('');
  const [loading, setLoading]   = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    if (password !== confirm) { setError('Passwords don\'t match'); return; }
    if (password.length < 8)  { setError('Password must be at least 8 characters'); return; }
    setLoading(true);
    setError('');
    try {
      const { member, csrf_token } = await api('/api/auth/reset-password', {method:'POST', body:{token, new_password: password}});
      if (csrf_token) _csrfToken = csrf_token;
      onLogin(member);
    } catch(e) {
      setError(e.message);
      setLoading(false);
    }
  }

  return (
    <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6">
      <div className="w-full max-w-sm">
        <h2 className="text-2xl font-black mb-2">Set new password</h2>
        <p className="text-gray-500 text-sm mb-6">Choose a new password for your account</p>
        <form onSubmit={handleSubmit} className="space-y-3">
          <input type="password" placeholder="New password (min 8 characters)" value={password} onChange={e => setPassword(e.target.value)}
            autoComplete="new-password" required
            className="w-full bg-gray-800 rounded-2xl px-5 py-4 text-white text-lg font-semibold outline-none focus:ring-2 focus:ring-orange-500" />
          <input type="password" placeholder="Confirm password" value={confirm} onChange={e => setConfirm(e.target.value)}
            autoComplete="new-password" required
            className="w-full bg-gray-800 rounded-2xl px-5 py-4 text-white text-lg font-semibold outline-none focus:ring-2 focus:ring-orange-500" />
          {error && (
            <div>
              <p className="text-red-400 text-sm text-center mb-2">{error}</p>
              {(error.toLowerCase().includes('invalid') || error.toLowerCase().includes('expired')) && (
                <button type="button" onClick={onForgot}
                  className="w-full text-orange-400 hover:text-orange-300 text-sm font-semibold text-center">
                  Request a new reset link
                </button>
              )}
            </div>
          )}
          <button type="submit" disabled={loading}
            className="w-full py-4 rounded-2xl font-bold text-white text-lg bg-orange-500 hover:bg-orange-400 disabled:opacity-50 transition-all">
            {loading ? <span className="pulse">Updating…</span> : 'Set new password'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ─── pending screen ───────────────────────────────────────────────────────────
function PendingScreen({ onLogout }) {
  const [notifState, setNotifState] = useState('loading'); // loading | unsupported | default | denied | subscribed
  const [vapidKey, setVapidKey] = useState(null);

  useEffect(() => {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      setNotifState('unsupported');
      return;
    }
    api('/api/push/vapid-key').then(d => {
      if (d.publicKey) setVapidKey(d.publicKey);
    }).catch(() => {});
    navigator.serviceWorker.ready.then(async reg => {
      const sub = await reg.pushManager.getSubscription();
      setNotifState(sub ? 'subscribed' : (Notification.permission === 'denied' ? 'denied' : 'default'));
    }).catch(() => setNotifState('unsupported'));
  }, []);

  async function enableNotifications() {
    if (!vapidKey) return;
    try {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') { setNotifState('denied'); return; }
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(vapidKey),
      });
      const subJson = sub.toJSON();
      await api('/api/push/subscribe', {
        method: 'POST',
        body: { endpoint: subJson.endpoint, p256dh: subJson.keys.p256dh, auth: subJson.keys.auth },
      });
      setNotifState('subscribed');
    } catch(e) {
      console.error('Push subscribe failed:', e);
    }
  }

  return (
    <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6 text-center">
      <div className="text-5xl mb-6">⏳</div>
      <h2 className="text-2xl font-black mb-3">Waiting for Approval</h2>
      <p className="text-gray-400 mb-6 max-w-xs">Your account is pending. An admin will approve it soon — check back shortly.</p>
      {notifState === 'default' && vapidKey && (
        <button onClick={enableNotifications}
          className="mb-6 px-5 py-3 rounded-2xl bg-orange-500/20 text-orange-400 text-sm font-semibold hover:bg-orange-500/30 transition-colors">
          🔔 Notify me when approved
        </button>
      )}
      {notifState === 'subscribed' && (
        <p className="mb-6 text-orange-400 text-sm font-semibold">🔔 You'll be notified when approved</p>
      )}
      <button onClick={onLogout} className="text-gray-500 hover:text-gray-300 text-sm">← Back to login</button>
    </div>
  );
}

// ─── logs panel (admin-only: control log, API stats, DB browser) ───────────────

  const [dbRows, setDbRows] = useState(null);
  const [dbLoading, setDbLoading] = useState(false);
  const [dbEditId, setDbEditId] = useState(null);
  const [dbEditDraft, setDbEditDraft] = useState({});

  const DB_TABLES = ['family_members', 'bookings', 'presets', 'control_log'];
  const DB_READONLY = ['control_log'];
  const actionColors = { on:'bg-green-900 text-green-300', off:'bg-gray-700 text-gray-400', set:'bg-blue-900 text-blue-300', extend:'bg-cyan-900 text-cyan-300', preset:'bg-purple-900 text-purple-300' };

  function fmtLogTime(iso) {
    const d = new Date(iso + 'Z');
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }

  async function loadDbTable(t) {
    setDbLoading(true); setDbRows(null);
    try { setDbRows(await api(`/api/admin/db/${t}`)); }
    catch(e) { alert(e.message); }
    finally { setDbLoading(false); }
  }

  function openDbTable(t) { setDbTable(t); setDbEditId(null); loadDbTable(t); }

  async function saveDbRow(id) {
    try {
      const updated = await api(`/api/admin/db/${dbTable}/${id}`, { method: 'PUT', body: dbEditDraft });
      setDbRows(prev => prev.map(r => r.id === id ? updated : r));
      setDbEditId(null);
    } catch(e) { alert(e.message); }
  }

  async function deleteDbRow(id) {
    if (!confirm(`Delete row #${id} from ${dbTable}? This cannot be undone.`)) return;
    try {
      await api(`/api/admin/db/${dbTable}/${id}`, { method: 'DELETE' });
      setDbRows(prev => prev.filter(r => r.id !== id));
    } catch(e) { alert(e.message); }
  }

  async function loadLog() {
    try {
      const res = await api('/api/admin/control_log?limit=5');
      setLog(res.entries);
      setLogTotal(res.total);
      setExpandedLogId(null);
    } catch {}
  }
  async function loadMoreLog() {
    if (!log) return;
    setLogLoadingMore(true);
    try {
      const res = await api(`/api/admin/control_log?limit=5&offset=${log.length}`);
      setLog(prev => [...prev, ...res.entries]);
      setLogTotal(res.total);
    } catch {}
    finally { setLogLoadingMore(false); }
  }
  async function loadApiStats() {
    try { setApiStats(await api('/api/admin/harvia-stats')); } catch {}
  }

  return (
    <div className="space-y-5">

          <div className="flex items-center gap-3">
            {log != null && <span className="text-xs text-gray-500">{log.length} of {logTotal}</span>}
            <button onClick={loadLog} className="text-xs text-gray-500 hover:text-gray-300">↻ refresh</button>
          </div>
        </div>
        {log == null ? (
          <p className="text-gray-500 text-sm pulse">Loading…</p>
        ) : log.length === 0 ? (
          <p className="text-gray-500 text-sm">No control actions yet.</p>
        ) : (
          <>
            <div className="space-y-1.5">
              {log.map(entry => {
                const isExpanded = expandedLogId === entry.id;
                let parsedNotes = null;
                try { parsedNotes = entry.notes ? JSON.parse(entry.notes) : null; } catch {}
                return (
                  <div key={entry.id} className="bg-gray-700/50 rounded-lg overflow-hidden">
                    <button onClick={() => setExpandedLogId(isExpanded ? null : entry.id)}
                      className="w-full flex items-center gap-2 px-3 py-2 text-sm flex-wrap text-left">
                      <span className="text-gray-500 text-xs w-32 flex-shrink-0">{fmtLogTime(entry.created_at)}</span>
                      <span className="font-semibold text-white w-20 truncate flex-shrink-0">{entry.member_name || '—'}</span>
                      <span className={`text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 ${actionColors[entry.action] || 'bg-gray-700 text-gray-300'}`}>
                        {entry.preset_name || entry.action}
                      </span>
                      {entry.target_temp_f != null && <span className="text-orange-400 font-semibold">{entry.target_temp_f}°F</span>}
                      {entry.on_time != null && <span className="text-gray-400">{entry.on_time} min</span>}
                      <span className="ml-auto text-gray-600 text-xs">{isExpanded ? '▲' : '▼'}</span>
                    </button>
                    {isExpanded && (
                      <div className="border-t border-gray-600/50 px-3 py-2.5 space-y-1 text-xs">
                        <div className="flex justify-between">
                          <span className="text-gray-500">Timestamp</span>
                          <span className="text-gray-300 font-mono">{new Date(entry.created_at + 'Z').toLocaleString()}</span>
                        </div>
                        <div className="flex justify-between">
                          <span className="text-gray-500">Member</span>
                          <span className="text-gray-300">{entry.member_name || '—'} (id {entry.member_id})</span>
                        </div>
                        <div className="flex justify-between">
                          <span className="text-gray-500">Action</span>
                          <span className={`font-bold px-1.5 py-0.5 rounded ${actionColors[entry.action] || 'bg-gray-700 text-gray-300'}`}>{entry.action}</span>
