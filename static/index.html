<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sweat Box</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛖</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sweat Box">
  <meta name="theme-color" content="#f97316">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #111827; color: #f3f4f6; font-family: system-ui, sans-serif; }
    input[type=range] { accent-color: #f97316; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 9999px; font-size: 0.85rem; font-weight: 600; }
    .timeline-slot { position: absolute; border-radius: 6px; padding: 4px 8px; font-size: 0.75rem; font-weight: 600; overflow: hidden; cursor: pointer; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* PWA bottom nav — hidden in browser, shown when installed */
    .pwa-bottom-nav { display: none; }
    @media (display-mode: standalone) {
      .pwa-top-nav    { display: none !important; }
      .pwa-bottom-nav { display: block !important; }
      .pwa-header     { padding-top: calc(1rem + env(safe-area-inset-top)) !important; }
      .pwa-main       { padding-bottom: calc(5rem + env(safe-area-inset-bottom)) !important; }
      .pwa-fab        { bottom: calc(4.75rem + env(safe-area-inset-bottom)) !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── helpers ────────────────────────────────────────────────────────────────
const cToF = c => c != null ? Math.round(c * 9/5 + 32) : null;
const fToC = f => Math.round((f - 32) * 5/9);
const fmt = v => v != null ? v : '—';
const pad = n => String(n).padStart(2,'0');
const timeStr = d => `${pad(d.getHours())}:${pad(d.getMinutes())}`;

let _onSessionExpired = null;

async function api(path, opts = {}) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 10000); // 10 s timeout
  try {
    const res = await fetch(path, {
      headers: {'Content-Type':'application/json'},
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
      signal: controller.signal,
    });
    if (res.status === 401 && _onSessionExpired) { _onSessionExpired(); throw new Error('Session expired'); }
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  } catch(e) {
    if (e.name === 'AbortError') throw new Error('Request timed out — check your connection');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

// ─── toast ──────────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type='info') => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return { toasts, push };
}

function ToastStack({ toasts }) {
  const colors = { info:'bg-gray-700', success:'bg-green-700', error:'bg-red-700' };
  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 flex flex-col gap-2 z-50 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`fade-in ${colors[t.type]||colors.info} text-white text-sm font-semibold px-5 py-3 rounded-xl shadow-lg`}>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

// ─── skeleton ────────────────────────────────────────────────────────────────
function Skeleton({ className = '' }) {
  return <div className={`bg-gray-700/60 rounded-xl animate-pulse ${className}`} />;
}

// ─── status pill ─────────────────────────────────────────────────────────────
function StatusPill({ status }) {
  if (!status) return <span className="status-pill bg-gray-700 text-gray-400">Loading…</span>;
  const on = status.active === 1;
  const heating = status.heatOn;
  const tempF = status.temperatureF ?? cToF(status.temperature);
  if (!status.online) return <span className="status-pill bg-gray-700 text-gray-400">Offline</span>;
  if (on && heating) return <span className="status-pill bg-orange-900 text-orange-300">🔥 Heating — {fmt(tempF)}°F</span>;
  if (on) return <span className="status-pill bg-amber-900 text-amber-300">♨️ On — {fmt(tempF)}°F</span>;
  return <span className="status-pill bg-gray-700 text-gray-400">💤 Off — {fmt(tempF)}°F</span>;
}

// ─── timeline ────────────────────────────────────────────────────────────────
// ─── day strip ───────────────────────────────────────────────────────────────
// Thin horizontal overview bar: 6 AM → midnight, colored blocks, now-line.
function DayStrip({ bookings, members, onSlotClick, onEmptyClick, loading }) {
  const STRIP_START = 6;
  const STRIP_END   = 24;
  const TOTAL_HRS   = STRIP_END - STRIP_START;

  const toFrac = t => {
    const [h, m] = t.split(':').map(Number);
    return Math.max(0, Math.min(1, (h + m / 60 - STRIP_START) / TOTAL_HRS));
  };

  const now = new Date();
  const nowFrac = (now.getHours() + now.getMinutes() / 60 - STRIP_START) / TOTAL_HRS;
  const showNow = nowFrac >= 0 && nowFrac <= 1;

  function handleClick(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const frac = (e.clientX - rect.left) / rect.width;
    const totalMins = (STRIP_START + frac * TOTAL_HRS) * 60;
    const h = Math.floor(totalMins / 60);
    const m = Math.round((totalMins % 60) / 15) * 15;
    onEmptyClick(`${pad(h >= 24 ? 23 : h)}:${pad(m >= 60 ? 45 : m)}`);
  }

  // Hour tick marks: every 3 hours (6, 9, 12, 15, 18, 21, 24)
  const ticks = Array.from({length: TOTAL_HRS + 1}, (_, i) => STRIP_START + i).filter(h => h % 3 === 0);

  return (
    <div className="mb-4">
      <div className="relative bg-gray-800 rounded-xl overflow-hidden cursor-pointer select-none"
        style={{height: 44}} onClick={handleClick}>

        {/* hour ticks */}
        {ticks.map(h => (
          <div key={h} className="absolute top-0 bottom-0 pointer-events-none"
            style={{left: `${((h - STRIP_START) / TOTAL_HRS) * 100}%`}}>
            <div className="w-px h-2 bg-gray-600/80 mt-auto" style={{marginTop: 26}} />
          </div>
        ))}

        {/* booking blocks */}
        {!loading && bookings.map(b => {
          const left  = toFrac(b.start_time);
          // Midnight-spanning: end_time < start_time → block goes to right edge
          const rightT = b.end_time < b.start_time ? '24:00' : b.end_time;
          const right = b.end_time < b.start_time ? 1 : toFrac(b.end_time);
          if (left >= 1) return null;
          const bMember = members.find(m => m.id === b.member_id);
          const color = bMember?.color || b.member_color || '#6B7280';
          return (
            <div key={b.id}
              className="absolute top-1.5 bottom-1.5 rounded cursor-pointer transition-opacity hover:opacity-100"
              style={{
                left: `${left * 100}%`,
                width: `${Math.max(0.01, right - left) * 100}%`,
                background: color + 'aa',
                borderLeft: `2px solid ${color}`,
                opacity: b.status === 'cancelled' ? 0.3 : 0.85,
              }}
              onClick={e => { e.stopPropagation(); onSlotClick(b); }}
            />
          );
        })}

        {/* loading shimmer */}
        {loading && <div className="absolute inset-0 bg-gray-700/50 animate-pulse" />}

        {/* now indicator */}
        {showNow && (
          <div className="absolute top-0 bottom-0 w-0.5 bg-orange-400 z-10 pointer-events-none"
            style={{left: `${nowFrac * 100}%`}} />
        )}
      </div>

      {/* axis labels */}
      <div className="flex justify-between text-[9px] text-gray-600 mt-0.5 px-0.5 pointer-events-none select-none">
        <span>6 AM</span><span>9</span><span>Noon</span><span>3 PM</span><span>6 PM</span><span>9</span><span>Mid</span>
      </div>
    </div>
  );
}

// ─── booking card ─────────────────────────────────────────────────────────────
function BookingCard({ booking: b, member, onPress, onPreheat, canPreheat }) {
  const color = member?.color || b.member_color || '#6B7280';
  const statusCls = {
    active:     'bg-green-800/80 text-green-300',
    preheating: 'bg-orange-900/80 text-orange-300',
    completed:  'bg-gray-700 text-gray-500',
    cancelled:  'bg-red-950 text-red-400',
    scheduled:  'bg-gray-700/80 text-gray-300',
  };
  const isPulsing = b.status === 'active' || b.status === 'preheating';

  // Format "23:00 – 01:00 (next day)" for midnight-spanning
  const timeLabel = b.end_time < b.start_time
    ? `${b.start_time} – ${b.end_time} (next day)`
    : `${b.start_time} – ${b.end_time}`;

  return (
    <div className="bg-gray-800 rounded-2xl overflow-hidden cursor-pointer active:bg-gray-750 transition-colors fade-in"
      style={{borderLeft: `4px solid ${color}`}}
      onClick={onPress}>
      <div className="px-4 py-3 flex items-center gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-0.5 flex-wrap">
            <span className="font-bold text-sm leading-none" style={{color}}>{b.member_name}</span>
            <span className={`text-[10px] px-2 py-0.5 rounded-full font-semibold capitalize leading-none ${statusCls[b.status] || statusCls.scheduled} ${isPulsing ? 'pulse' : ''}`}>
              {b.status}
            </span>
          </div>
          <div className="text-white font-semibold text-sm">{timeLabel}</div>
          <div className="text-xs text-gray-500 mt-0.5">{fmt(cToF(b.target_temp))}°F · {b.on_time} min</div>
        </div>
        {canPreheat && (
          <button
            onClick={e => { e.stopPropagation(); onPreheat(); }}
            className="flex-shrink-0 bg-orange-500 hover:bg-orange-400 active:bg-orange-600 text-white text-xs font-bold px-3 py-2 rounded-xl transition-colors">
            🔥 Preheat
          </button>
        )}
      </div>
    </div>
  );
}

// ─── booking modal ────────────────────────────────────────────────────────────
function BookingModal({ defaultTime, defaultDate, members, bookings, onClose, onSave, editingBooking }) {
  const now = new Date();
  const isEditing = !!editingBooking;

  const [memberId, setMemberId] = useState(isEditing ? editingBooking.member_id : (members[0]?.id || ''));
  const [startTime, setStartTime] = useState(isEditing ? editingBooking.start_time : (defaultTime || timeStr(now)));
  const [durationMins, setDurationMins] = useState(isEditing ? editingBooking.on_time : 60);
  const [tempF, setTempF] = useState(isEditing ? cToF(editingBooking.target_temp) : 194);

  const bookingDate = isEditing ? editingBooking.date : (defaultDate || now.toISOString().slice(0,10));
  const isToday = bookingDate === now.toISOString().slice(0,10);
  const isPastTime = !isEditing && isToday && startTime < timeStr(now);

  const endTime = (() => {
    const [h,m] = startTime.split(':').map(Number);
    const total = h*60 + m + durationMins;
    return `${pad(Math.floor(total/60)%24)}:${pad(total%60)}`;
  })();

  const selectedMember = members.find(m => m.id === Number(memberId));
  const memberMaxTempF = selectedMember?.max_temp ? cToF(selectedMember.max_temp) : 230;
  const effectiveTempF = Math.min(tempF, memberMaxTempF);

  async function handleSave() {
    await onSave({
      member_id: Number(memberId),
      date: defaultDate || now.toISOString().slice(0,10),
      start_time: startTime,
      end_time: endTime,
      target_temp: fToC(effectiveTempF),
      on_time: durationMins,
    });
  }

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center p-4" onClick={onClose}>
      <div className="bg-gray-800 rounded-2xl w-full max-w-sm p-6 fade-in" onClick={e=>e.stopPropagation()}>
        <h2 className="text-lg font-bold mb-4">{isEditing ? 'Edit Session' : 'Book a Session'}</h2>

        {/* member picker — locked when editing */}
        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wide">Who?</label>
          <div className="flex flex-wrap gap-2">
            {members.map(m => (
              <button key={m.id} disabled={isEditing}
                className={`px-4 py-2 rounded-xl font-semibold text-sm transition-all ${memberId===m.id?'ring-2 ring-white':'opacity-60'} ${isEditing?'cursor-default':''}`}
                style={{background: m.color+'44', color: m.color, border: `2px solid ${m.color}`}}
                onClick={() => { if(isEditing) return; setMemberId(m.id); const maxF = m.max_temp ? cToF(m.max_temp) : 230; setTempF(Math.min(cToF(m.default_temp), maxF)); setDurationMins(m.default_time); }}>
                {m.name}
              </button>
            ))}
          </div>
        </div>

        {/* start time */}
        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wide">Start time</label>
          <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)}
            className={`w-full bg-gray-700 rounded-xl px-4 py-3 text-white text-lg font-semibold ${isPastTime ? 'ring-2 ring-red-500' : ''}`} />
          {isPastTime && <p className="text-red-400 text-xs mt-1.5">⚠ That time has already passed today</p>}
        </div>

        {/* existing bookings for this date (exclude self when editing) */}
        {bookings && bookings.filter(b => !isEditing || b.id !== editingBooking.id).length > 0 && (
          <div className="mb-4">
            <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wide">Already booked</label>
            <div className="space-y-1">
              {bookings.filter(b => !isEditing || b.id !== editingBooking.id).map(b => (
                <div key={b.id} className="flex items-center gap-2 px-3 py-1.5 bg-gray-700/50 rounded-lg">
                  <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background: b.member_color || '#6B7280'}} />
                  <span className="text-sm text-gray-300 font-medium truncate">{b.member_name}</span>
                  <span className="text-xs text-gray-500 ml-auto flex-shrink-0">{b.start_time}–{b.end_time}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* duration */}
        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wide">Duration — {durationMins} min</label>
          <div className="flex gap-2">
            {[30,60,90,120].map(d => (
              <button key={d}
                className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${durationMins===d?'bg-orange-500 text-white':'bg-gray-700 text-gray-300'}`}
                onClick={()=>setDurationMins(d)}>{d}m</button>
            ))}
          </div>
        </div>

        {/* temp */}
        <div className="mb-6">
          <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wide">Temperature — {effectiveTempF}°F ({fToC(effectiveTempF)}°C){selectedMember?.max_temp ? <span className="text-orange-400 ml-1">(max {cToF(selectedMember.max_temp)}°F)</span> : null}</label>
          <input type="range" min={104} max={memberMaxTempF} step={2} value={effectiveTempF} onChange={e=>setTempF(Number(e.target.value))}
            className="w-full h-3" />
          <div className="flex justify-between text-xs text-gray-500 mt-1"><span>104°F</span><span>{memberMaxTempF}°F</span></div>
        </div>

        <div className="text-xs text-gray-500 mb-4">
          Ends at <strong className="text-gray-300">{endTime}</strong>
          {endTime <= startTime && <span className="text-orange-400 ml-1">(next day)</span>}
        </div>

        <div className="flex gap-3">
          <button onClick={onClose} className="flex-1 bg-gray-700 text-gray-300 py-3 rounded-xl font-semibold">Cancel</button>
          <button onClick={handleSave} disabled={isPastTime}
            style={{background: isPastTime ? undefined : (selectedMember?.color || '#f97316')}}
            className={`flex-1 text-white py-3 rounded-xl font-bold transition-opacity ${isPastTime ? 'bg-gray-600 opacity-50 cursor-not-allowed' : ''}`}>
            {isEditing ? 'Save Changes' : 'Book It'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── slot detail modal ────────────────────────────────────────────────────────
function SlotModal({ booking, onClose, onCancel, onPreheat, onEdit }) {
  const now = new Date();
  const bookingStart = new Date(`${booking.date}T${booking.start_time}`);
  const minsUntil = (bookingStart - now) / 60000;
  const canPreheat = booking.status === 'scheduled' && minsUntil <= 90 && minsUntil > 0;
  const canEdit = booking.status === 'scheduled';
  const color = booking.member_color || '#f97316';

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center p-4" onClick={onClose}>
      <div className="bg-gray-800 rounded-2xl w-full max-w-sm p-6 fade-in" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 mb-4">
          <div className="w-4 h-4 rounded-full" style={{background: color}} />
          <h2 className="text-lg font-bold">{booking.member_name}'s Session</h2>
        </div>
        <div className="space-y-2 text-sm text-gray-300 mb-6">
          <div>{booking.date} · {booking.start_time}–{booking.end_time}{booking.end_time < booking.start_time ? ' (next day)' : ''}</div>
          <div>Temp: {cToF(booking.target_temp)}°F ({booking.target_temp}°C)</div>
          <div>Duration: {booking.on_time} min</div>
          <div className="capitalize">Status: <span className="font-semibold text-white">{booking.status}</span></div>
        </div>
        <div className="flex flex-col gap-3">
          {canPreheat && (
            <button onClick={()=>onPreheat(booking.id)}
              className="w-full bg-orange-500 hover:bg-orange-400 text-white py-3 rounded-xl font-bold text-base">
              🔥 Start Preheat
            </button>
          )}
          {canEdit && (
            <button onClick={()=>onEdit(booking)}
              className="w-full bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-xl font-semibold">
              ✏️ Edit Booking
            </button>
          )}
          {booking.status !== 'completed' && booking.status !== 'cancelled' && (
            <button onClick={()=>onCancel(booking.id)}
              className="w-full bg-red-900 hover:bg-red-800 text-red-300 py-3 rounded-xl font-semibold">
              Cancel Booking
            </button>
          )}
          <button onClick={onClose} className="w-full bg-gray-700 text-gray-300 py-3 rounded-xl font-semibold">Close</button>
        </div>
      </div>
    </div>
  );
}

// ─── members panel ────────────────────────────────────────────────────────────
const PALETTE = ['#F97316','#EF4444','#3B82F6','#10B981','#8B5CF6','#EC4899','#F59E0B','#06B6D4'];

function MembersPanel({ members, onReload, currentMember }) {
  const isAdmin = currentMember?.is_admin;
  const [adding, setAdding] = useState(false);
  const [name, setName] = useState('');
  const [color, setColor] = useState(PALETTE[0]);
  const [tempF, setTempF] = useState(194);
  const [duration, setDuration] = useState(60);
  const [editingId, setEditingId] = useState(null);
  const [editTempF, setEditTempF] = useState(194);
  const [editDuration, setEditDuration] = useState(60);

  async function handleAdd() {
    if (!name.trim()) return;
    await api('/api/admin/members', {method:'POST', body:{name:name.trim(), default_temp:fToC(tempF), default_time:duration, color}});
    setAdding(false); setName('');
    onReload();
  }

  async function handleDelete(id) {
    if (!confirm('Remove this member and all their bookings?')) return;
    await api(`/api/admin/members/${id}`, {method:'DELETE'});
    onReload();
  }

  function startEdit(m) {
    setEditingId(m.id);
    setEditTempF(cToF(m.default_temp));
    setEditDuration(m.default_time);
  }

  async function handleSaveEdit(id) {
    try {
      await api(`/api/members/${id}`, {method:'PUT', body:{default_temp: fToC(editTempF), default_time: editDuration}});
      setEditingId(null);
      onReload();
    } catch(e) { alert(e.message); }
  }

  return (
    <div className="bg-gray-800 rounded-2xl p-5">
      <div className="flex justify-between items-center mb-4">
        <h2 className="font-bold text-base">Family Members</h2>
        {isAdmin && (
          <button onClick={()=>setAdding(!adding)} className="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 px-3 py-1.5 rounded-lg font-semibold">
            {adding ? 'Cancel' : '+ Add'}
          </button>
        )}
      </div>

      {adding && isAdmin && (
        <div className="border border-gray-700 rounded-xl p-4 mb-4 fade-in">
          <input placeholder="Name" value={name} onChange={e=>setName(e.target.value)}
            className="w-full bg-gray-700 rounded-lg px-3 py-2 text-white mb-3" />
          <div className="flex flex-wrap gap-2 mb-3">
            {PALETTE.map(c => (
              <button key={c} onClick={()=>setColor(c)}
                className={`w-7 h-7 rounded-full ${color===c?'ring-2 ring-white ring-offset-2 ring-offset-gray-800':''}`}
                style={{background:c}} />
            ))}
          </div>
          <div className="text-xs text-gray-400 mb-1">Default temp: {tempF}°F</div>
          <input type="range" min={104} max={230} step={2} value={tempF} onChange={e=>setTempF(Number(e.target.value))} className="w-full mb-3" />
          <div className="text-xs text-gray-400 mb-1">Default duration: {duration} min</div>
          <div className="flex gap-2 mb-4">
            {[30,60,90,120].map(d=>(
              <button key={d} onClick={()=>setDuration(d)}
                className={`flex-1 py-1.5 rounded-lg text-xs font-semibold ${duration===d?'bg-orange-500 text-white':'bg-gray-700 text-gray-300'}`}>{d}m</button>
            ))}
          </div>
          <button onClick={handleAdd} className="w-full py-2 rounded-xl font-bold text-white" style={{background:color}}>Add {name||'Member'}</button>
        </div>
      )}

      <div className="space-y-2">
        {members.map(m => {
          const canEdit = isAdmin || m.id === currentMember?.id;
          const isEditing = editingId === m.id;
          return (
            <div key={m.id} className="bg-gray-700/50 rounded-xl overflow-hidden">
              <div className="flex items-center justify-between px-4 py-3">
                <div className="flex items-center gap-3">
                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background:m.color}} />
                  <div>
                    <div className="font-semibold">
                      {m.name}
                      {m.id === currentMember?.id && <span className="text-xs text-gray-500 ml-1.5">(you)</span>}
                    </div>
                    <div className="text-xs text-gray-400">{cToF(m.default_temp)}°F · {m.default_time} min</div>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  {canEdit && (
                    <button onClick={() => isEditing ? setEditingId(null) : startEdit(m)}
                      className="text-xs text-gray-500 hover:text-orange-400 font-semibold px-2 py-1 rounded-lg hover:bg-gray-700 transition-colors">
                      {isEditing ? 'Cancel' : 'Edit'}
                    </button>
                  )}
                  {isAdmin && m.id !== currentMember?.id && (
                    <button onClick={() => handleDelete(m.id)} className="text-gray-600 hover:text-red-400 text-lg leading-none ml-1">×</button>
                  )}
                </div>
              </div>

              {isEditing && (
                <div className="px-4 pb-4 pt-2 border-t border-gray-600/50 fade-in">
                  <div className="text-xs text-gray-400 mb-1">Default temp: <span className="text-white font-semibold">{editTempF}°F ({fToC(editTempF)}°C)</span></div>
                  <input type="range" min={104} max={230} step={2} value={editTempF}
                    onChange={e=>setEditTempF(Number(e.target.value))} className="w-full mb-3" />
                  <div className="text-xs text-gray-400 mb-2">Default duration</div>
                  <div className="flex gap-2 mb-4">
                    {[30,60,90,120].map(d=>(
                      <button key={d} onClick={()=>setEditDuration(d)}
                        className={`flex-1 py-1.5 rounded-lg text-xs font-semibold ${editDuration===d?'bg-orange-500 text-white':'bg-gray-700 text-gray-300'}`}>{d}m</button>
                    ))}
                  </div>
                  <button onClick={() => handleSaveEdit(m.id)}
                    className="w-full py-2 rounded-xl font-bold text-white bg-orange-500 hover:bg-orange-400 transition-colors">
                    Save preferences
                  </button>
                </div>
              )}
            </div>
          );
        })}
        {members.length === 0 && <p className="text-gray-500 text-sm">No members yet.</p>}
      </div>
    </div>
  );
}

// ─── controls ────────────────────────────────────────────────────────────────
function Controls({ status, bookings, members, presets = [], currentMember, onRefresh, toast }) {
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);

  const isAdmin = currentMember?.is_admin;

  // Only this user's bookings that are active or starting within 90 min
  const relevantBookings = bookings.filter(b => {
    if (b.member_id !== currentMember?.id) return false;
    if (b.date !== todayStr) return false;
    if (b.status === 'cancelled' || b.status === 'completed') return false;
    const start = new Date(`${b.date}T${b.start_time}`);
    const end   = new Date(`${b.date}T${b.end_time}`);
    return end > now && (start - now) / 60000 <= 90;
  });

  // Admins always unlocked; others need their own booking within 90 min
  const unlocked = isAdmin || relevantBookings.length > 0;

  // Live member profile (always up-to-date from the members list)
  const myProfile = members.find(m => m.id === currentMember?.id);

  // Per-member max temperature (from live profile, fallback to session data)
  const myMaxTempC = myProfile?.max_temp ?? currentMember?.max_temp ?? null;
  const myMaxTempF = myMaxTempC ? cToF(myMaxTempC) : 230;

  // Seed state from booking → live profile → auth session → hardcoded fallback
  const seedTemp = relevantBookings[0]?.target_temp ?? myProfile?.default_temp ?? currentMember?.default_temp ?? 90;
  const seedDur  = relevantBookings[0]?.on_time    ?? myProfile?.default_time  ?? currentMember?.default_time  ?? 60;

  const [tempF, setTempF] = useState(Math.min(cToF(seedTemp), myMaxTempF));
  const [duration, setDuration] = useState(seedDur);

  // Re-sync defaults when members finish loading (or preferences change),
  // but only if the user hasn't manually adjusted the sliders.
  const [manuallySet, setManuallySet] = useState(false);
  useEffect(() => {
    if (manuallySet || !myProfile) return;
    if (relevantBookings.length === 0) {
      setTempF(cToF(myProfile.default_temp));
      setDuration(myProfile.default_time);
    }
  }, [myProfile?.default_temp, myProfile?.default_time]);

  // Fetch status once when controls become unlocked. After that, only refresh
  // on button press or manual tap — never poll automatically.
  useEffect(() => {
    if (!unlocked) return;
    onRefresh();
  }, [unlocked]);
  const [loading, setLoading] = useState(false);

  const sauna_on = status?.active === 1;

  async function handleToggle() {
    setLoading(true);
    try {
      if (sauna_on) {
        await api('/api/sauna/off', {method:'POST'});
        toast('Sauna turned off', 'info');
      } else {
        await api('/api/sauna/on', {method:'POST', body:{targetTempF: Math.min(tempF, myMaxTempF), onTime: duration}});
        toast('Sauna is heating up!', 'success');
      }
      setTimeout(onRefresh, 1500);
    } catch(e) {
      toast(e.message, 'error');
    } finally { setLoading(false); }
  }

  async function handlePreset(name) {
    setLoading(true);
    try {
      await api(`/api/sauna/preset/${name}`, {method:'POST'});
      const p = presets.find(x => x.name === name);
      toast(`${p?.label || name} started!`, 'success');
      setTimeout(onRefresh, 1500);
    } catch(e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  async function handleSet() {
    setLoading(true);
    try {
      await api('/api/sauna/set', {method:'POST', body:{targetTempF: Math.min(tempF, myMaxTempF), onTime: duration}});
      toast('Settings updated', 'success');
      setTimeout(onRefresh, 1000);
    } catch(e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  const currentTempF = status?.temperatureF ?? cToF(status?.temperature);
  const targetTempF  = status?.targetTempF  ?? cToF(status?.targetTemp);
  const remaining = status?.remainingTime;

  return (
    <div className={`bg-gray-800 rounded-2xl p-5 transition-opacity ${!unlocked?'opacity-50 pointer-events-none':''}`}>
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-bold text-base">Sauna Controls</h2>
        {unlocked
          ? <button onClick={onRefresh} className="text-xs text-gray-500 hover:text-gray-300 px-2 py-1 rounded-lg hover:bg-gray-700 transition-colors">↻ refresh</button>
          : <span className="text-xs bg-gray-700 text-gray-400 px-3 py-1 rounded-full">🔒 Book a session to unlock</span>
        }
      </div>

      {/* live readings */}
      <div className="grid grid-cols-3 gap-3 mb-5">
        <div className="bg-gray-700/60 rounded-xl p-3 text-center">
          <div className="text-xl font-bold text-orange-400">{currentTempF != null ? `${currentTempF}°F` : '—'}</div>
          <div className="text-xs text-gray-400 mt-0.5">Current</div>
        </div>
        <div className="bg-gray-700/60 rounded-xl p-3 text-center">
          <div className="text-xl font-bold text-red-400">{targetTempF != null ? `${targetTempF}°F` : '—'}</div>
          <div className="text-xs text-gray-400 mt-0.5">Target</div>
        </div>
        <div className="bg-gray-700/60 rounded-xl p-3 text-center">
          <div className="text-xl font-bold text-amber-300">{remaining != null ? `${remaining}m` : '—'}</div>
          <div className="text-xs text-gray-400 mt-0.5">Remaining</div>
        </div>
      </div>

      {/* presets */}
      {presets.length > 0 && (
        <div className="mb-4">
          <div className="text-sm text-gray-400 mb-2">Quick start</div>
          <div className="flex gap-2 flex-wrap">
            {presets.map(p => {
              const overLimit = myMaxTempC && p.target_temp > myMaxTempC;
              return (
                <button key={p.name} onClick={() => handlePreset(p.name)} disabled={loading || overLimit}
                  title={overLimit ? `Exceeds your ${myMaxTempF}°F limit` : ''}
                  className={`flex flex-col items-center px-3 py-2 rounded-xl text-xs font-semibold transition-colors
                    ${overLimit ? 'bg-gray-800 text-gray-600 cursor-not-allowed' : 'bg-gray-700 hover:bg-orange-900/50 text-gray-300 hover:text-orange-300'}
                    disabled:opacity-50`}>
                  <span>{p.label}</span>
                  <span className="text-gray-500 font-normal mt-0.5">{p.target_temp_f}°F · {p.on_time}m</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* temp slider */}
      <div className="mb-4">
        <div className="flex justify-between text-sm mb-2">
          <span className="text-gray-400">Target temp{myMaxTempC ? <span className="text-xs text-orange-500 ml-1.5">max {myMaxTempF}°F</span> : null}</span>
          <span className="font-bold text-orange-400">{Math.min(tempF, myMaxTempF)}°F <span className="text-gray-500 font-normal">({fToC(Math.min(tempF, myMaxTempF))}°C)</span></span>
        </div>
        <input type="range" min={104} max={myMaxTempF} step={2} value={Math.min(tempF, myMaxTempF)}
          onChange={e=>{ setManuallySet(true); setTempF(Number(e.target.value)); }} className="w-full h-3" />
        <div className="flex justify-between text-xs text-gray-600 mt-1"><span>104°F</span><span>{myMaxTempF}°F</span></div>
      </div>

      {/* duration */}
      <div className="mb-5">
        <div className="text-sm text-gray-400 mb-2">Duration</div>
        <div className="flex gap-2">
          {[30,60,90,120].map(d=>(
            <button key={d} onClick={()=>{ setManuallySet(true); setDuration(d); }}
              className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${duration===d?'bg-orange-500 text-white':'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>{d}m</button>
          ))}
        </div>
      </div>

      {/* buttons */}
      <div className="flex gap-3">
        {sauna_on && (
          <button onClick={handleSet} disabled={loading}
            className="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-3.5 rounded-xl font-semibold transition-all">
            Update
          </button>
        )}
        <button onClick={handleToggle} disabled={loading}
          className={`flex-1 py-3.5 rounded-xl font-bold text-base transition-all ${sauna_on?'bg-red-700 hover:bg-red-600 text-white':'bg-orange-500 hover:bg-orange-400 text-white'}`}>
          {loading ? <span className="pulse">…</span> : sauna_on ? '⏹ Turn Off' : '🔥 Preheat'}
        </button>
      </div>
    </div>
  );
}

// ─── pin pad ─────────────────────────────────────────────────────────────────
function PinPad({ onComplete }) {
  const [digits, setDigits] = useState([]);

  function press(d) {
    if (digits.length >= 4) return;
    const next = [...digits, d];
    setDigits(next);
    if (next.length === 4) {
      setTimeout(() => { onComplete(next.join('')); setDigits([]); }, 150);
    }
  }

  function del() { setDigits(d => d.slice(0, -1)); }

  return (
    <div>
      <div className="flex justify-center gap-4 mb-6">
        {[0,1,2,3].map(i => (
          <div key={i} className={`w-4 h-4 rounded-full transition-all ${i < digits.length ? 'bg-orange-400 scale-110' : 'bg-gray-600'}`} />
        ))}
      </div>
      <div className="grid grid-cols-3 gap-3">
        {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k, i) => (
          <button key={i}
            disabled={k === ''}
            onClick={() => k === '⌫' ? del() : k !== '' ? press(String(k)) : null}
            className={`h-14 rounded-2xl text-xl font-bold transition-all active:scale-95 ${k===''?'invisible':k==='⌫'?'bg-gray-700 text-gray-300 hover:bg-gray-600':'bg-gray-700 hover:bg-gray-600 text-white'}`}>
            {k}
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── admin panel ──────────────────────────────────────────────────────────────
function AdminPanel({ currentMember, presets = [], onReloadPresets }) {
  const [data, setData] = useState(null);
  const [log, setLog] = useState(null);
  const [busy, setBusy] = useState(false);
  // preset editing
  const [editPresetName, setEditPresetName] = useState(null);
  const [editPresetLabel, setEditPresetLabel] = useState('');
  const [editPresetTempF, setEditPresetTempF] = useState(194);
  const [editPresetOnTime, setEditPresetOnTime] = useState(60);
  // approve flow
  const [approvingId, setApprovingId] = useState(null);
  const [approveHasLimit, setApproveHasLimit] = useState(false);
  const [approveMaxTempF, setApproveMaxTempF] = useState(212);
  // max temp inline edit for approved members
  const [editMaxTempId, setEditMaxTempId] = useState(null);
  const [editMaxTempHasLimit, setEditMaxTempHasLimit] = useState(false);
  const [editMaxTempF, setEditMaxTempF] = useState(212);

  async function load() {
    try { setData(await api('/api/admin/members')); } catch {}
  }
  async function loadLog() {
    try { setLog(await api('/api/admin/control_log')); } catch {}
  }

  function startEditPreset(p) {
    setEditPresetName(p.name);
    setEditPresetLabel(p.label);
    setEditPresetTempF(p.target_temp_f);
    setEditPresetOnTime(p.on_time);
  }

  async function savePreset() {
    setBusy(true);
    try {
      await api(`/api/admin/presets/${editPresetName}`, {method:'PUT', body:{
        label: editPresetLabel,
        target_temp: fToC(editPresetTempF),
        on_time: editPresetOnTime,
      }});
      setEditPresetName(null);
      onReloadPresets();
    } catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  async function deletePreset(name) {
    if (!confirm('Delete this preset?')) return;
    setBusy(true);
    try {
      await api(`/api/admin/presets/${name}`, {method:'DELETE'});
      onReloadPresets();
    } catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  useEffect(() => { load(); loadLog(); }, []);

  async function approve(id) {
    setBusy(true);
    try {
      const body = approveHasLimit ? { max_temp: fToC(approveMaxTempF) } : {};
      await api(`/api/admin/members/${id}/approve`, {method:'POST', body});
      setApprovingId(null); setApproveHasLimit(false);
      await load();
    }
    catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  async function reject(id) {
    if (!confirm('Reject this member?')) return;
    setBusy(true);
    try { await api(`/api/admin/members/${id}/reject`, {method:'POST'}); await load(); }
    catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  async function toggleAdmin(id, makeAdmin) {
    if (!confirm(makeAdmin ? 'Make this member an admin?' : 'Remove admin privileges?')) return;
    setBusy(true);
    try { await api(`/api/admin/members/${id}`, {method:'PUT', body:{is_admin: makeAdmin}}); await load(); }
    catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  function startEditMaxTemp(m) {
    setEditMaxTempId(m.id);
    setEditMaxTempHasLimit(m.max_temp != null);
    setEditMaxTempF(m.max_temp ? cToF(m.max_temp) : 212);
  }

  async function saveMaxTemp(id) {
    setBusy(true);
    try {
      const body = { max_temp: editMaxTempHasLimit ? fToC(editMaxTempF) : null };
      await api(`/api/admin/members/${id}`, {method:'PUT', body});
      setEditMaxTempId(null);
      await load();
    }
    catch(e) { alert(e.message); }
    finally { setBusy(false); }
  }

  if (!data) return <div className="text-center text-gray-500 py-8 pulse">Loading…</div>;

  const pending = data.members.filter(m => m.status === 'pending');
  const approved = data.members.filter(m => m.status === 'approved');

  function fmtLogTime(iso) {
    const d = new Date(iso + 'Z');
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }
  const actionColors = { on:'bg-green-900 text-green-300', off:'bg-gray-700 text-gray-400', set:'bg-blue-900 text-blue-300', preset:'bg-purple-900 text-purple-300' };

  return (
    <div className="space-y-5">
      {pending.length > 0 && (
        <div className="bg-gray-800 rounded-2xl p-5">
          <h2 className="font-bold text-base mb-4 text-orange-400">Pending Approval ({pending.length})</h2>
          <div className="space-y-3">
            {pending.map(m => (
              <div key={m.id} className="bg-gray-700/50 rounded-xl overflow-hidden">
                <div className="flex items-center justify-between px-4 py-3">

                      <span className="text-sm text-gray-300 font-semibold">Max temperature limit</span>
                      <button onClick={() => setApproveHasLimit(!approveHasLimit)}

                        <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform ${approveHasLimit ? 'translate-x-5' : 'translate-x-0.5'}`} />
                      </button>
                    </div>
                    {approveHasLimit && (
                      <div className="mb-3">
                        <div className="text-xs text-gray-400 mb-1">{approveMaxTempF}°F ({fToC(approveMaxTempF)}°C)</div>
                        <input type="range" min={104} max={230} step={2} value={approveMaxTempF}
                          onChange={e => setApproveMaxTempF(Number(e.target.value))} className="w-full" />
                        <div className="flex justify-between text-xs text-gray-600 mt-0.5"><span>104°F</span><span>230°F</span></div>
                      </div>
                    )}
                    <button onClick={() => approve(m.id)} disabled={busy}
                      className="w-full py-2 rounded-xl font-bold text-white bg-green-700 hover:bg-green-600 disabled:opacity-50">
                      {approveHasLimit ? `Approve with ${approveMaxTempF}°F limit` : 'Approve (no limit)'}
                    </button>
                  </div>

        </div>

      <div className="bg-gray-800 rounded-2xl p-5">
        <h2 className="font-bold text-base mb-4">Members ({approved.length})</h2>
        <div className="space-y-2">
          {approved.map(m => (
            <div key={m.id} className="bg-gray-700/50 rounded-xl overflow-hidden">
              <div className="flex items-center justify-between px-4 py-3">
                <div className="flex items-center gap-3">
                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background: m.color || '#6B7280'}} />
                  <div>
                    <div className="font-semibold">
                      {m.name}
                      {m.is_admin ? <span className="text-xs text-orange-400 ml-1.5">admin</span> : null}
                    </div>
                    <div className="text-xs text-gray-400">
                      {cToF(m.default_temp)}°F · {m.default_time} min
                      {m.max_temp != null
                        ? <span className="text-orange-400 ml-1.5">· max {cToF(m.max_temp)}°F</span>
                        : <span className="text-gray-600 ml-1.5">· no temp limit</span>}
                    </div>
                  </div>
                </div>
                {m.id !== currentMember.id && (
                  <div className="flex items-center gap-2">
                    <button onClick={() => editMaxTempId === m.id ? setEditMaxTempId(null) : startEditMaxTemp(m)} disabled={busy}
                      className="text-xs text-gray-500 hover:text-orange-400 font-semibold px-2 py-1 rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-50">
                      {editMaxTempId === m.id ? 'cancel' : 'limit'}
                    </button>
                    <button onClick={() => toggleAdmin(m.id, !m.is_admin)} disabled={busy}
                      className={`text-xs font-semibold px-2 py-1 rounded-lg transition-colors disabled:opacity-50 ${m.is_admin ? 'text-orange-400 hover:bg-orange-900/40' : 'text-gray-500 hover:text-orange-400 hover:bg-gray-700'}`}>
                      {m.is_admin ? 'admin ✓' : 'admin'}
                    </button>
                    <button onClick={() => reject(m.id)} disabled={busy}
                      className="text-gray-600 hover:text-red-400 text-lg leading-none disabled:opacity-50">×</button>
                  </div>
                )}
              </div>
              {editMaxTempId === m.id && (
                <div className="px-4 pb-4 pt-2 border-t border-gray-600/50 fade-in">
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-sm text-gray-300 font-semibold">Max temperature limit</span>
                    <button onClick={() => setEditMaxTempHasLimit(!editMaxTempHasLimit)}
                      className={`relative w-10 h-5 rounded-full transition-colors ${editMaxTempHasLimit ? 'bg-orange-500' : 'bg-gray-600'}`}>
                      <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform ${editMaxTempHasLimit ? 'translate-x-5' : 'translate-x-0.5'}`} />
                    </button>
                  </div>
                  {editMaxTempHasLimit && (
                    <div className="mb-3">
                      <div className="text-xs text-gray-400 mb-1">{editMaxTempF}°F ({fToC(editMaxTempF)}°C)</div>
                      <input type="range" min={104} max={230} step={2} value={editMaxTempF}
                        onChange={e => setEditMaxTempF(Number(e.target.value))} className="w-full" />
                      <div className="flex justify-between text-xs text-gray-600 mt-0.5"><span>104°F</span><span>230°F</span></div>
                    </div>
                  )}
                  <button onClick={() => saveMaxTemp(m.id)} disabled={busy}
                    className="w-full py-2 rounded-xl font-bold text-white bg-orange-500 hover:bg-orange-400 disabled:opacity-50">
                    {editMaxTempHasLimit ? `Set limit to ${editMaxTempF}°F` : 'Remove limit'}
                  </button>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      <div className="bg-gray-800 rounded-2xl p-5">
        <h2 className="font-bold text-base mb-4">Presets</h2>
        <div className="space-y-2">
          {presets.map(p => (
            <div key={p.name} className="bg-gray-700/50 rounded-xl overflow-hidden">
              <div className="flex items-center justify-between px-4 py-3">
                <div>
                  <div className="font-semibold">{p.label}</div>
                  <div className="text-xs text-gray-400">{p.target_temp_f}°F · {p.on_time} min{p.steam_en ? ' · steam' : ''}</div>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => editPresetName === p.name ? setEditPresetName(null) : startEditPreset(p)}
                    className="text-xs text-gray-500 hover:text-orange-400 font-semibold px-2 py-1 rounded-lg hover:bg-gray-700 transition-colors">
                    {editPresetName === p.name ? 'cancel' : 'edit'}
                  </button>
                  <button onClick={() => deletePreset(p.name)} disabled={busy}
                    className="text-xs text-gray-500 hover:text-red-400 font-semibold px-2 py-1 rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-50">
                    delete
                  </button>
                </div>
              </div>
              {editPresetName === p.name && (
                <div className="px-4 pb-4 pt-2 border-t border-gray-600/50 fade-in space-y-3">
                  <div>
                    <div className="text-xs text-gray-400 mb-1">Name</div>
                    <input value={editPresetLabel} onChange={e => setEditPresetLabel(e.target.value)}
                      className="w-full bg-gray-700 rounded-lg px-3 py-2 text-white text-sm" />
                  </div>
                  <div>
                    <div className="text-xs text-gray-400 mb-1">Temperature — {editPresetTempF}°F ({fToC(editPresetTempF)}°C)</div>
                    <input type="range" min={104} max={230} step={2} value={editPresetTempF}
                      onChange={e => setEditPresetTempF(Number(e.target.value))} className="w-full" />
                    <div className="flex justify-between text-xs text-gray-600 mt-0.5"><span>104°F</span><span>230°F</span></div>
                  </div>
                  <div>
                    <div className="text-xs text-gray-400 mb-1">Duration</div>
                    <div className="flex gap-2">
                      {[30,60,90,120].map(d => (
                        <button key={d} onClick={() => setEditPresetOnTime(d)}
                          className={`flex-1 py-1.5 rounded-lg text-xs font-semibold ${editPresetOnTime===d?'bg-orange-500 text-white':'bg-gray-700 text-gray-300'}`}>{d}m</button>
                      ))}
                    </div>
                  </div>
                  <button onClick={savePreset} disabled={busy}
                    className="w-full py-2 rounded-xl font-bold text-white bg-orange-500 hover:bg-orange-400 disabled:opacity-50">
                    Save preset
                  </button>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      <div className="bg-gray-800 rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-bold text-base">Control Log</h2>
          <button onClick={loadLog} className="text-xs text-gray-500 hover:text-gray-300">↻ refresh</button>
        </div>
        {log == null ? (
          <p className="text-gray-500 text-sm pulse">Loading…</p>
        ) : log.length === 0 ? (
          <p className="text-gray-500 text-sm">No control actions yet.</p>
        ) : (
          <div className="space-y-1.5">
            {log.map(entry => (
              <div key={entry.id} className="flex items-center gap-2 bg-gray-700/50 rounded-lg px-3 py-2 text-sm flex-wrap">
                <span className="text-gray-500 text-xs w-32 flex-shrink-0">{fmtLogTime(entry.created_at)}</span>
                <span className="font-semibold text-white w-20 truncate flex-shrink-0">{entry.member_name || '—'}</span>
                <span className={`text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 ${actionColors[entry.action] || 'bg-gray-700 text-gray-300'}`}>
                  {entry.preset_name || entry.action}
                </span>
                {entry.target_temp_f != null && <span className="text-orange-400 font-semibold">{entry.target_temp_f}°F</span>}
                {entry.on_time != null && <span className="text-gray-400">{entry.on_time} min</span>}
                {entry.notes && <span className="text-gray-600 text-xs truncate">{entry.notes}</span>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── main app ─────────────────────────────────────────────────────────────────
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

function MainApp({ currentMember, onLogout }) {
  const [status, setStatus] = useState(null);
  const [bookings, setBookings] = useState([]);
  const [members, setMembers] = useState([]);
  const [presets, setPresets] = useState([]);
  const [showBookModal, setShowBookModal] = useState(false);
  const [bookDefaultTime, setBookDefaultTime] = useState(null);
  const [selectedSlot, setSelectedSlot] = useState(null);
  const [tab, setTab] = useState('today'); // today | controls | members | admin
  const [pendingCount, setPendingCount] = useState(0);
  const { toasts, push: toast } = useToast();
  const statusRef = useRef(null);

  // Push notifications
  const [vapidKey, setVapidKey] = useState(null);
  const [notifState, setNotifState] = useState('loading'); // loading | unsupported | default | granted | denied | subscribed

  const today = new Date().toISOString().slice(0,10);
  const [viewDate, setViewDate] = useState(today);
  const [bookingsLoading, setBookingsLoading] = useState(true);

  async function loadStatus() {
    try {
      const s = await api('/api/sauna/status');
      setStatus(s);
    } catch(e) {
      setStatus(prev => prev); // keep stale
    }
  }

  async function loadBookings(date = viewDate) {
    setBookingsLoading(true);
    try {
      const b = await api(`/api/bookings?date=${date}`);
      setBookings(b);
    } catch {} finally {
      setBookingsLoading(false);
    }
  }

  useEffect(() => { loadBookings(viewDate); }, [viewDate]);

  async function loadMembers() {
    try {
      const m = await api('/api/members');
      setMembers(m);
    } catch {}
  }

  async function loadPresets() {
    try {
      const p = await api('/api/presets');
      setPresets(p);
    } catch {}
  }

  async function loadPendingCount() {
    if (!currentMember?.is_admin) return;
    try {
      const d = await api('/api/admin/members');
      setPendingCount(d.pending_count || 0);
    } catch {}
  }

  useEffect(() => {
    loadStatus();
    loadBookings();
    loadMembers();
    loadPresets();
    loadPendingCount();
    // Only poll pending count (DB-only, no Harvia API hit).
    // Status is fetched on load, after button presses, and on manual refresh only.
    const interval = setInterval(loadPendingCount, 300000); // 5 min
    return () => clearInterval(interval);
  }, []);

  // Push notification setup
  useEffect(() => {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      setNotifState('unsupported');
      return;
    }
    api('/api/push/vapid-key').then(d => {
      if (d.publicKey) setVapidKey(d.publicKey);
    }).catch(() => {});
    navigator.serviceWorker.ready.then(async reg => {
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        setNotifState('subscribed');
      } else {
        setNotifState(Notification.permission === 'denied' ? 'denied' : 'default');
      }
    });
    // Listen for messages from SW (e.g. notification tap → open booking)
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'OPEN_BOOKING') {
        setTab('today');
        loadBookings();
        loadStatus();
      }
    });
  }, []);

  // Refresh bookings (DB only) when app is foregrounded — no Harvia API call.
  useEffect(() => {
    function onVisible() {
      if (!document.hidden) loadBookings();
    }
    document.addEventListener('visibilitychange', onVisible);
    return () => document.removeEventListener('visibilitychange', onVisible);
  }, []);

  async function sendTestNotification() {
    try {
      await api('/api/push/test', { method: 'POST' });
      toast('Test notification sent — check your phone!', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }

  async function subscribePush() {
    if (!vapidKey) { toast('Push notifications are not configured on the server', 'error'); return; }
    if (notifState === 'subscribed') {
      // Toggle off
      try {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          await api('/api/push/unsubscribe', { method: 'POST', body: { endpoint: sub.endpoint } });
          await sub.unsubscribe();
        }
        setNotifState('default');
        toast('Notifications disabled', 'info');
      } catch(e) { toast('Could not disable notifications', 'error'); }
      return;
    }
    try {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') { setNotifState('denied'); return; }
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(vapidKey),
      });
      const subJson = sub.toJSON();
      await api('/api/push/subscribe', {
        method: 'POST',
        body: { endpoint: subJson.endpoint, p256dh: subJson.keys.p256dh, auth: subJson.keys.auth },
      });
      setNotifState('subscribed');
      toast('Preheat reminders on!', 'success');
    } catch(e) { toast('Could not enable notifications', 'error'); }
  }

  // Offline state + booking queue
  const [isOnline, setIsOnline] = useState(navigator.onLine);

  useEffect(() => {
    const goOnline  = () => setIsOnline(true);
    const goOffline = () => setIsOnline(false);
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, []);

  // PWA install prompt
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) && !window.navigator.standalone;
  const [installPromptEvent, setInstallPromptEvent] = useState(null);
  const [showInstallBanner, setShowInstallBanner] = useState(false);

  useEffect(() => {
    if (isStandalone || localStorage.getItem('installBannerDismissed')) return;
    const handler = e => { e.preventDefault(); setInstallPromptEvent(e); setShowInstallBanner(true); };
    window.addEventListener('beforeinstallprompt', handler);
    if (isIOS) setTimeout(() => setShowInstallBanner(true), 1500);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  async function handleInstall() {
    if (!installPromptEvent) return;
    installPromptEvent.prompt();
    const { outcome } = await installPromptEvent.userChoice;
    if (outcome === 'accepted') { setShowInstallBanner(false); setInstallPromptEvent(null); }
  }

  function dismissInstallBanner() {
    setShowInstallBanner(false);
    localStorage.setItem('installBannerDismissed', '1');
  }

  // Flush queued bookings whenever we come back online
  useEffect(() => {
    if (isOnline) flushBookingQueue();
  }, [isOnline]);

  async function flushBookingQueue() {
    const queue = JSON.parse(localStorage.getItem('pendingBookings') || '[]');
    if (queue.length === 0) return;
    const failed = [];
    let saved = 0;
    for (const item of queue) {
      try {
        await api('/api/bookings', { method: 'POST', body: item });
        saved++;
      } catch { failed.push(item); }
    }
    if (saved > 0) { toast(`${saved} queued booking${saved > 1 ? 's' : ''} saved!`, 'success'); loadBookings(); }
    if (failed.length > 0) localStorage.setItem('pendingBookings', JSON.stringify(failed));
    else localStorage.removeItem('pendingBookings');
  }

  // SW message: background sync triggered flush
  useEffect(() => {
    if (!('serviceWorker' in navigator)) return;
    const handler = e => {
      if (e.data?.type === 'FLUSH_BOOKING_QUEUE') flushBookingQueue();
    };
    navigator.serviceWorker.addEventListener('message', handler);
    return () => navigator.serviceWorker.removeEventListener('message', handler);
  }, []);

  async function handleCreateBooking(data) {
    try {
      await api('/api/bookings', {method:'POST', body:data});
      toast('Booking saved!', 'success');
      setShowBookModal(false);
      loadBookings();
    } catch(e) {
      if (!navigator.onLine) {
        const queue = JSON.parse(localStorage.getItem('pendingBookings') || '[]');
        queue.push(data);
        localStorage.setItem('pendingBookings', JSON.stringify(queue));
        if ('serviceWorker' in navigator && 'sync' in ServiceWorkerRegistration.prototype) {
          navigator.serviceWorker.ready.then(reg => reg.sync.register('sync-bookings')).catch(() => {});
        }
        toast("You're offline — booking queued and will save when back online", 'info');
        setShowBookModal(false);
      } else {
        toast(e.message, 'error');
      }
    }
  }

  async function handleCancelBooking(id) {
    try {
      await api(`/api/bookings/${id}`, {method:'DELETE'});
      toast('Booking cancelled', 'info');
      setSelectedSlot(null);
      loadBookings();
    } catch(e) { toast(e.message, 'error'); }
  }

  const [editingBooking, setEditingBooking] = useState(null);

  async function handleEditBooking(id, data) {
    try {
      await api(`/api/bookings/${id}`, {method:'PUT', body:data});
      toast('Booking updated!', 'success');
      setEditingBooking(null);
      loadBookings();
    } catch(e) { toast(e.message, 'error'); }
  }

  async function handlePreheat(id) {
    try {
      await api(`/api/bookings/${id}/preheat`, {method:'POST'});
      toast('Preheating started!', 'success');
      setSelectedSlot(null);
      loadBookings();
      loadStatus();
    } catch(e) { toast(e.message, 'error'); }
  }

  function handleEmptyTimelineClick(t) {
    if (members.length === 0) {
      toast('Add a family member first', 'info');
      setTab('members');
      return;
    }
    setBookDefaultTime(t);
    setShowBookModal(true);
  }

  const nowStr = timeStr(new Date());

  return (
    <div className="min-h-screen bg-gray-900 text-white max-w-lg mx-auto">
      {/* header */}
      <header className="pwa-header sticky top-0 z-30 bg-gray-900/95 backdrop-blur border-b border-gray-800 px-5 py-4">
        <div className="flex items-center justify-between">
          <h1 className="text-xl font-black tracking-tight">🛖 Sweat Box</h1>
          <div className="flex items-center gap-2">
            {vapidKey && notifState !== 'unsupported' && notifState !== 'loading' && (
              <button
                onClick={subscribePush}
                title={notifState === 'subscribed' ? 'Reminders on — tap to disable' : notifState === 'denied' ? 'Notifications blocked in browser settings' : 'Enable preheat reminders'}
                className={`text-base px-1.5 py-1 rounded-lg transition-colors ${notifState === 'subscribed' ? 'text-orange-400 hover:bg-gray-800' : notifState === 'denied' ? 'text-red-500 opacity-60 cursor-not-allowed' : 'text-gray-500 hover:text-gray-300 hover:bg-gray-800'}`}
                disabled={notifState === 'denied'}>
                {notifState === 'subscribed' ? '🔔' : notifState === 'denied' ? '🔕' : '🔔'}
              </button>
            )}
            <button onClick={onLogout} title={`Logout ${currentMember?.name}`}
              className="text-xs text-gray-500 hover:text-gray-300 font-semibold px-2 py-1 rounded-lg hover:bg-gray-800 transition-colors">
              {currentMember?.name} ↩
            </button>
          </div>
        </div>
      </header>

      {/* offline banner */}
      {!isOnline && (
        <div className="bg-amber-900/60 border-b border-amber-700 px-4 py-2 text-amber-300 text-xs font-semibold text-center">
          You're offline — showing cached data
        </div>
      )}

      {/* install banner */}
      {showInstallBanner && (
        <div className="bg-gray-800 border-b border-gray-700 px-4 py-3">
          {isIOS ? (
            <div className="flex items-start gap-3">
              <span className="text-2xl mt-0.5">🛖</span>
              <div className="flex-1">
                <p className="text-sm font-semibold text-white">Add Sweat Box to your Home Screen</p>
                <p className="text-xs text-gray-400 mt-1">
                  Tap <span className="text-blue-400 font-semibold">Share</span> <span className="text-blue-400">⬆</span> at the bottom of Safari, then tap <span className="text-blue-400 font-semibold">"Add to Home Screen"</span>
                </p>
              </div>
              <button onClick={dismissInstallBanner} className="text-gray-500 hover:text-gray-300 text-lg leading-none p-1">✕</button>
            </div>
          ) : (
            <div className="flex items-center gap-3">
              <span className="text-2xl">🛖</span>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-semibold text-white">Add Sweat Box to your Home Screen</p>
                <p className="text-xs text-gray-400">Opens instantly, works offline</p>
              </div>
              <button onClick={handleInstall} className="bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white text-xs font-bold px-3 py-2 rounded-lg shrink-0">Add App</button>
              <button onClick={dismissInstallBanner} className="text-gray-500 hover:text-gray-300 text-lg leading-none p-1">✕</button>
            </div>
          )}
        </div>
      )}

      {/* tab nav */}
      {(() => {
        const tabs = [
          {id:'today',    label:'Today',    icon:'🗓️'},
          {id:'controls', label:'Controls', icon:'🔥'},
          {id:'members',  label:'Members',  icon:'👤'},
          ...(currentMember?.is_admin ? [{id:'admin', label:'Admin', icon:'⚙️', badge: pendingCount}] : []),
        ];
        const TopBtn = t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex-1 py-3 text-sm font-semibold transition-colors relative ${tab===t.id?'text-orange-400 border-b-2 border-orange-400':'text-gray-500 hover:text-gray-300'}`}>
            {t.label}
            {t.badge > 0 && (
              <span className="absolute top-1.5 right-1/4 w-4 h-4 bg-orange-500 text-white text-xs font-black rounded-full flex items-center justify-center leading-none">{t.badge}</span>
            )}
          </button>
        );
        const BotBtn = t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex-1 flex flex-col items-center py-2 gap-0.5 transition-colors relative ${tab===t.id?'text-orange-400':'text-gray-500 hover:text-gray-300'}`}>
            <span className="text-xl leading-none">{t.icon}</span>
            <span className="text-[10px] font-semibold">{t.label}</span>
            {t.badge > 0 && (
              <span className="absolute top-1 right-[calc(50%-18px)] w-4 h-4 bg-orange-500 text-white text-[10px] font-black rounded-full flex items-center justify-center leading-none">{t.badge}</span>
            )}
          </button>
        );
        return (
          <>
            <nav className="pwa-top-nav flex border-b border-gray-800 bg-gray-900 sticky top-[65px] z-20">
              {tabs.map(TopBtn)}
            </nav>
            <nav className="pwa-bottom-nav fixed bottom-0 left-0 right-0 z-30 bg-gray-900/95 backdrop-blur border-t border-gray-800">
              <div className="max-w-lg mx-auto flex" style={{paddingBottom:'env(safe-area-inset-bottom)'}}>
                {tabs.map(BotBtn)}
              </div>
            </nav>
          </>
        );
      })()}

      {/* content */}
      <main className="pwa-main px-4 py-5 pb-28 space-y-5">
        {tab === 'today' && (
          <>
            {/* 7-day selector */}
            <div className="flex gap-2 overflow-x-auto pb-1 mb-3 scrollbar-hide">
              {Array.from({length: 7}, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() + i);
                const iso = d.toISOString().slice(0,10);
                const isToday = i === 0;
                const active = viewDate === iso;
                return (
                  <button key={iso} onClick={() => setViewDate(iso)}
                    className={`flex-shrink-0 flex flex-col items-center px-3 py-2 rounded-xl text-xs font-semibold transition-all ${active ? 'bg-orange-500 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>
                    <span className="uppercase tracking-wide text-[10px]">{isToday ? 'Today' : d.toLocaleDateString('en-US',{weekday:'short'})}</span>
                    <span className="text-base font-black leading-tight">{d.getDate()}</span>
                  </button>
                );
              })}
            </div>

            {/* date heading + refresh */}
            <div className="flex justify-between items-center mb-3">
              <h2 className="font-bold text-base">
                {new Date(viewDate + 'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
              </h2>
              <button onClick={() => loadBookings(viewDate)} className="text-xs text-gray-500 hover:text-gray-300">↻ refresh</button>
            </div>

            {/* horizontal day strip */}
            <DayStrip
              bookings={bookings}
              members={members}
              onSlotClick={setSelectedSlot}
              onEmptyClick={handleEmptyTimelineClick}
              loading={bookingsLoading}
            />

            {/* booking cards — skeletons while loading */}
            {bookingsLoading ? (
              <div className="space-y-2">
                <Skeleton className="h-20" />
                <Skeleton className="h-20" />
              </div>
            ) : bookings.length > 0 ? (
              <div className="space-y-2">
                {bookings.map(b => {
                  const bMember = members.find(m => m.id === b.member_id);
                  const bookingStart = new Date(`${b.date}T${b.start_time}`);
                  const minsUntil = (bookingStart - new Date()) / 60000;
                  const canPreheat = b.status === 'scheduled' && minsUntil <= 90 && minsUntil > 0;
                  return (
                    <BookingCard
                      key={b.id}
                      booking={b}
                      member={bMember}
                      onPress={() => setSelectedSlot(b)}
                      onPreheat={() => handlePreheat(b.id)}
                      canPreheat={canPreheat}
                    />
                  );
                })}
              </div>
            ) : (
              <div className="flex flex-col items-center justify-center py-16 text-center">
                <div className="text-5xl mb-3">🛖</div>
                <p className="text-gray-400 font-semibold">No bookings yet</p>
                <p className="text-gray-600 text-sm mt-1">Tap the strip above or + to add one</p>
              </div>
            )}
          </>
        )}

        {tab === 'controls' && (
          <Controls status={status} bookings={bookings} members={members} presets={presets} currentMember={currentMember} onRefresh={loadStatus} toast={toast} />
        )}

        {tab === 'members' && (
          <MembersPanel members={members} currentMember={currentMember} onReload={() => { loadMembers(); loadBookings(); }} />
        )}

        {tab === 'admin' && currentMember?.is_admin && (
          <AdminPanel currentMember={currentMember} presets={presets} onReloadPresets={loadPresets} />
        )}
      </main>

      {/* FAB */}
      {tab === 'today' && (
        <button
          onClick={() => {
            if (members.length === 0) { toast('Add a family member first','info'); setTab('members'); return; }
            setBookDefaultTime(nowStr);
            setShowBookModal(true);
          }}
          className="pwa-fab fixed bottom-6 right-6 bg-orange-500 hover:bg-orange-400 text-white rounded-full w-14 h-14 text-2xl shadow-xl flex items-center justify-center z-40 transition-all active:scale-95">
          +
        </button>
      )}

      {/* modals */}
      {showBookModal && (
        <BookingModal
          defaultTime={bookDefaultTime}
          defaultDate={viewDate}
          members={members}
          bookings={bookings}
          onClose={()=>setShowBookModal(false)}
          onSave={handleCreateBooking}
        />
      )}
      {selectedSlot && (
        <SlotModal
          booking={selectedSlot}
          onClose={()=>setSelectedSlot(null)}
          onCancel={handleCancelBooking}
          onPreheat={handlePreheat}
          onEdit={b => { setSelectedSlot(null); setEditingBooking(b); }}
        />
      )}
      {editingBooking && (
        <BookingModal
          editingBooking={editingBooking}
          members={members}
          bookings={bookings}
          onClose={() => setEditingBooking(null)}
          onSave={data => handleEditBooking(editingBooking.id, data)}
        />
      )}

      <ToastStack toasts={toasts} />
    </div>
  );
}

// ─── app root (auth state machine) ───────────────────────────────────────────
function App() {
  const [authState, setAuthState] = useState('loading'); // loading|login|signup|pending|main
  const [currentMember, setCurrentMember] = useState(null);
  const [sessionExpired, setSessionExpired] = useState(false);

  useEffect(() => {
    _onSessionExpired = () => {
      setCurrentMember(null);
      setSessionExpired(true);
      setAuthState('login');
    };
    api('/api/auth/me').then(({ member }) => {
      if (!member) { setAuthState('login'); return; }
      if (member.status === 'pending') { setAuthState('pending'); return; }
      setCurrentMember(member);
      setAuthState('main');
    }).catch(() => setAuthState('login'));
    return () => { _onSessionExpired = null; };
  }, []);

  function handleLogin(member) {
    setSessionExpired(false);
    setCurrentMember(member);
    setAuthState('main');
  }

  function handleSignup(result) {
    setSessionExpired(false);
    if (result.status === 'approved') {
      setCurrentMember(result.member);
      setAuthState('main');
    } else {
      setAuthState('pending');
    }
  }

  async function handleLogout() {
    try { await api('/api/auth/logout', {method:'POST'}); } catch {}
    setCurrentMember(null);
    setAuthState('login');
  }

  if (authState === 'loading') return (
    <div className="min-h-screen bg-gray-900 flex items-center justify-center">
      <div className="text-gray-500 pulse text-lg">Loading…</div>
    </div>
  );
  if (authState === 'login')   return <LoginScreen onLogin={handleLogin} onShowSignup={() => setAuthState('signup')} sessionExpired={sessionExpired} />;
  if (authState === 'signup')  return <SignupScreen onSignup={handleSignup} onBack={() => setAuthState('login')} />;
  if (authState === 'pending') return <PendingScreen onLogout={handleLogout} />;
  return <MainApp currentMember={currentMember} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
